<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages du Talent | HubISoccer</title>
    <meta name="description" content="Échangez avec votre coach et votre parrain.">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Quill supprimé -->
    <link rel="stylesheet" href="talent-messages.css">
</head>
<body>
    <!-- ========== DÉBUT : NAVBAR MEMBRE ========== -->
    <nav class="member-nav">
        <div class="nav-brand">
            <img src="../../img/logo-navbar.png" alt="HubISoccer" class="logo-nav">
            <span class="nav-title">Espace Talent</span>
        </div>
        <button class="menu-toggle" id="menuToggle">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <div class="nav-links" id="navLinks">
            <a href="talent-dash.html" data-nav-link="talent-dash.html">
                <i class="fas fa-tachometer-alt"></i> Tableau de bord
            </a>
            <a href="talent-messages.html" class="active" data-nav-link="talent-messages.html">
                <i class="fas fa-envelope"></i> Messages
            </a>
            <a href="talent-contrat.html" data-nav-link="talent-contrat.html">
                <i class="fas fa-file-signature"></i> Contrat
            </a>
            <a href="#" id="logoutBtn">
                <i class="fas fa-sign-out-alt"></i> Déconnexion
            </a>
        </div>
    </nav>
    <!-- ========== FIN : NAVBAR MEMBRE ========== -->

    <!-- ========== DÉBUT : CONTENU PRINCIPAL ========== -->
    <main class="messages-main">
        <div class="messages-container">
            <h1>
                <i class="fas fa-envelope"></i> Messagerie
            </h1>
            <p class="subtitle">Échangez avec le coach et le parrain de votre club.</p>

            <!-- Liste des messages -->
            <div id="messagesList" class="messages-list">
                <p class="loading-placeholder">Chargement des messages...</p>
            </div>

            <!-- Zone de réponse -->
            <div class="reply-section">
                <textarea id="replyEditor" rows="5" placeholder="Écrivez votre message..."></textarea>
                <button id="sendReplyBtn" class="btn-send">
                    <i class="fas fa-paper-plane"></i> Envoyer
                </button>
            </div>
        </div>
    </main>
    <!-- ========== FIN : CONTENU PRINCIPAL ========== -->

    <!-- ========== DÉBUT : FOOTER ========== -->
    <footer>
        <div class="legal">
            <p><strong>HubISoccer - The Hub of Inspiration of Soccer</strong></p>
            <p>RCCM : RB/ABC/24 A 111814 | IFU : 0201910800236</p>
            <p>© 2026 HubISoccer - Ozawa. Tous droits réservés.</p>
        </div>
    </footer>
    <!-- ========== FIN : FOOTER ========== -->

    <div id="toastContainer" class="toast-container"></div>

    <!-- Maintien de l'ID dans les liens -->
    <script>
        (function() {
            var params = new URLSearchParams(window.location.search);
            var id = params.get('id');
            if (!id) return;
            document.querySelectorAll('a[data-nav-link]').forEach(function(link) {
                var basePage = link.getAttribute('data-nav-link');
                if (basePage) link.href = basePage + '?id=' + id;
            });
        })();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Quill supprimé -->
    <script src="talent-messages.js"></script>
</body>
</html>
