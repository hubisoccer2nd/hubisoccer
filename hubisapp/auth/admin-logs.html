<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logs de connexion | HubISoccer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #ffffff;
            color: #1a1a2e;
            overflow-x: hidden;
        }
        .bg-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        .bg-shapes .shape {
            position: absolute;
            background: rgba(107, 59, 164, 0.05);
            border-radius: 50%;
            filter: blur(80px);
        }
        .shape-1 { width: 500px; height: 500px; top: -200px; left: -200px; }
        .shape-2 { width: 600px; height: 600px; bottom: -200px; right: -200px; background: rgba(107, 59, 164, 0.08); }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 48px;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(107,59,164,0.1);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .logo { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .logo img { height: 42px; }
        .logo span { font-size: 1.4rem; font-weight: 700; color: #6b3ba4; }
        .nav-buttons {
            display: flex;
            gap: 16px;
        }
        .nav-btn-outline {
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: 500;
            text-decoration: none;
            border: 1px solid #6b3ba4;
            color: #6b3ba4;
            background: transparent;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }
        .nav-btn-outline:hover { background: #6b3ba4; color: white; transform: translateY(-2px); }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 24px;
        }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 16px;
        }
        .page-header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #6b3ba4, #9b6bcd);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .back-link {
            color: #6b3ba4;
            text-decoration: none;
            font-weight: 500;
        }
        .card {
            background: #fbfbff;
            border-radius: 32px;
            padding: 32px;
            margin-bottom: 40px;
            border: 1px solid #e9e9f0;
            box-shadow: 0 8px 20px rgba(0,0,0,0.02);
        }
        .card h2 {
            font-size: 1.6rem;
            margin-bottom: 24px;
            color: #1a1a2e;
        }
        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 24px;
            align-items: flex-end;
        }
        .filter-group {
            flex: 1;
            min-width: 180px;
        }
        .filter-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        .filter-group input, .filter-group select {
            width: 100%;
            padding: 10px 16px;
            border: 1px solid #e2e2f0;
            border-radius: 28px;
            background: white;
            font-family: 'Inter', sans-serif;
        }
        .btn {
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .btn-primary {
            background: #6b3ba4;
            color: white;
        }
        .btn-primary:hover {
            background: #552e84;
            transform: translateY(-2px);
        }
        .btn-secondary {
            background: transparent;
            border: 1px solid #6b3ba4;
            color: #6b3ba4;
        }
        .btn-secondary:hover {
            background: #6b3ba4;
            color: white;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            overflow-x: auto;
            display: block;
        }
        th, td {
            text-align: left;
            padding: 12px 16px;
            border-bottom: 1px solid #e9e9f0;
        }
        th {
            font-weight: 600;
            color: #1a1a2e;
        }
        .success-badge {
            background: #e0f2fe;
            color: #0369a1;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
            display: inline-block;
        }
        .failure-badge {
            background: #fee2e2;
            color: #b91c1c;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
            display: inline-block;
        }
        .footer {
            text-align: center;
            padding: 32px;
            font-size: 0.8rem;
            color: #aaa;
            border-top: 1px solid #eee;
            margin-top: 60px;
        }
        @media (max-width: 768px) {
            .navbar { padding: 16px 24px; }
            .container { padding: 24px 16px; }
            .card { padding: 24px; }
            th, td { padding: 8px 12px; }
            .filters { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>

    <nav class="navbar">
        <div class="logo" onclick="window.location.href='../index.html'">
            <img src="../public/img/logo-navbar.png" alt="HubISoccer">
            <span>HubISoccer</span>
        </div>
        <div class="nav-buttons">
            <a href="../index.html" class="nav-btn-outline">Accueil</a>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>Logs de connexion</h1>
            <a href="admin-dashboard.html" class="back-link"><i class="fas fa-arrow-left"></i> Retour au tableau de bord</a>
        </div>

        <div class="card">
            <h2>Tentatives de connexion</h2>
            <div class="filters">
                <div class="filter-group">
                    <label>Email</label>
                    <input type="text" id="filterEmail" placeholder="Rechercher par email">
                </div>
                <div class="filter-group">
                    <label>Statut</label>
                    <select id="filterStatus">
                        <option value="">Tous</option>
                        <option value="true">Succès</option>
                        <option value="false">Échec</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Date début</label>
                    <input type="date" id="filterDateStart">
                </div>
                <div class="filter-group">
                    <label>Date fin</label>
                    <input type="date" id="filterDateEnd">
                </div>
                <div class="filter-group">
                    <button class="btn btn-primary" id="applyFilters">Appliquer</button>
                    <button class="btn btn-secondary" id="resetFilters">Réinitialiser</button>
                </div>
            </div>
            <div style="overflow-x: auto;">
                <table id="logsTable">
                    <thead>
                        <tr><th>Email</th><th>Statut</th><th>Date & heure</th><th>Adresse IP</th><th>User Agent</th>+<
                    </thead>
                    <tbody id="logsTableBody"></tbody>
                 </table>
            </div>
            <div style="margin-top: 20px; text-align: center;">
                <button class="btn btn-secondary" id="loadMoreBtn">Charger plus</button>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>© 2026 HubISoccer - Administration sécurisée</p>
    </div>

    <script src="auth.js"></script>
    <script src="admin-auth.js"></script>
    <script>
        let currentPage = 0;
        const pageSize = 50;
        let currentFilters = {
            email: '',
            success: null,
            dateStart: null,
            dateEnd: null
        };

        async function loadLogs(reset = true) {
            if (reset) {
                currentPage = 0;
                document.getElementById('logsTableBody').innerHTML = '<tr><td colspan="5">Chargement...</td></tr>';
            }
            let query = window.supabaseAuthPrive
                .from('login_attempts')
                .select('*')
                .order('attempted_at', { ascending: false })
                .range(currentPage * pageSize, (currentPage + 1) * pageSize - 1);

            if (currentFilters.email) {
                query = query.ilike('email', `%${currentFilters.email}%`);
            }
            if (currentFilters.success !== null) {
                query = query.eq('success', currentFilters.success);
            }
            if (currentFilters.dateStart) {
                query = query.gte('attempted_at', currentFilters.dateStart + 'T00:00:00');
            }
            if (currentFilters.dateEnd) {
                query = query.lte('attempted_at', currentFilters.dateEnd + 'T23:59:59');
            }

            const { data, error } = await query;
            if (error) {
                console.error(error);
                document.getElementById('logsTableBody').innerHTML = '<tr><td colspan="5">Erreur de chargement</td></tr>';
                return;
            }
            if (reset) {
                document.getElementById('logsTableBody').innerHTML = '';
            }
            if (!data || data.length === 0) {
                if (reset) document.getElementById('logsTableBody').innerHTML = '<tr><td colspan="5">Aucune tentative trouvée</td></tr>';
                document.getElementById('loadMoreBtn').style.display = 'none';
                return;
            }
            data.forEach(log => {
                const statusHtml = log.success ? '<span class="success-badge">Succès</span>' : '<span class="failure-badge">Échec</span>';
                const row = `
                    <tr>
                        <td>${escapeHtml(log.email)}</td>
                        <td>${statusHtml}</td>
                        <td>${new Date(log.attempted_at).toLocaleString()}</td>
                        <td>${log.ip_address || '-'}</td>
                        <td>${log.user_agent ? escapeHtml(log.user_agent).substring(0, 80) : '-'}</td>
                    </tr>
                `;
                document.getElementById('logsTableBody').insertAdjacentHTML('beforeend', row);
            });
            if (data.length < pageSize) {
                document.getElementById('loadMoreBtn').style.display = 'none';
            } else {
                document.getElementById('loadMoreBtn').style.display = 'inline-block';
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function applyFilters() {
            currentFilters.email = document.getElementById('filterEmail').value.trim();
            const statusVal = document.getElementById('filterStatus').value;
            currentFilters.success = statusVal === '' ? null : (statusVal === 'true');
            currentFilters.dateStart = document.getElementById('filterDateStart').value;
            currentFilters.dateEnd = document.getElementById('filterDateEnd').value;
            loadLogs(true);
        }

        function resetFilters() {
            document.getElementById('filterEmail').value = '';
            document.getElementById('filterStatus').value = '';
            document.getElementById('filterDateStart').value = '';
            document.getElementById('filterDateEnd').value = '';
            currentFilters = { email: '', success: null, dateStart: null, dateEnd: null };
            loadLogs(true);
        }

        document.getElementById('applyFilters').addEventListener('click', applyFilters);
        document.getElementById('resetFilters').addEventListener('click', resetFilters);
        document.getElementById('loadMoreBtn').addEventListener('click', () => {
            currentPage++;
            loadLogs(false);
        });

        // Chargement initial
        loadLogs(true);
    </script>
</body>
</html>
