<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logs de connexion | HubISoccer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="admin-designauth.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
    <script src="admin-auth.js"></script>
    </head>
<body>
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>

    <nav class="navbar">
        <div class="logo" onclick="window.location.href='../../index.html'">
            <img src="logo-navbar.png" alt="HubISoccer">
            <span>HubISoccer</span>
        </div>
        <div class="nav-buttons">
            <a href="../../index.html" class="nav-btn-outline">Accueil</a>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>Logs de connexion</h1>
            <a href="admin-dashboard.html" class="back-link"><i class="fas fa-arrow-left"></i> Retour au tableau de bord</a>
        </div>

        <div class="card">
            <h2>Tentatives de connexion</h2>
            <div class="filters">
                <div class="filter-group">
                    <label>Email</label>
                    <input type="text" id="filterEmail" placeholder="Rechercher par email">
                </div>
                <div class="filter-group">
                    <label>Statut</label>
                    <select id="filterStatus">
                        <option value="">Tous</option>
                        <option value="true">Succès</option>
                        <option value="false">Échec</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Date début</label>
                    <input type="date" id="filterDateStart">
                </div>
                <div class="filter-group">
                    <label>Date fin</label>
                    <input type="date" id="filterDateEnd">
                </div>
                <div class="filter-group">
                    <button class="btn btn-primary" id="applyFilters">Appliquer</button>
                    <button class="btn btn-secondary" id="resetFilters">Réinitialiser</button>
                </div>
            </div>
            <div style="overflow-x: auto;">
                <table id="logsTable">
                    <thead><tr><th>Email</th><th>Statut</th><th>Date & heure</th><th>Adresse IP</th><th>User Agent</th></tr></thead>
                    <tbody id="logsTableBody"></tbody>
                </table>
            </div>
            <div style="margin-top: 20px; text-align: center;">
                <button class="btn btn-secondary" id="loadMoreBtn">Charger plus</button>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="compliance-badges">
            <div class="badge">Conformité APDP Bénin</div>
            <div class="badge">Règlementation FIFA</div>
            <div class="badge">Triple Projet Sport-Études-Carrière</div>
        </div>
        <div class="contact-box">
            <a href="tel:+2290195973157" class="contact-item">📞 +229 01 95 97 31 57</a>
            <a href="mailto:contacthubisoccer@gmail.com" class="contact-item">📧 contacthubisoccer@gmail.com</a>
        </div>
        <div class="legal">
            <p>© Ozawa-Hubisoccer</p>
        </div>
    </footer>

    <div id="toastContainer" class="toast-container"></div>

    <script>
        let currentPage = 0;
        const pageSize = 50;
        let currentFilters = { email: '', success: null, dateStart: null, dateEnd: null };

        async function loadLogs(reset = true) {
            if (reset) { currentPage = 0; document.getElementById('logsTableBody').innerHTML = '<tr><td colspan="5">Chargement...</td></tr>'; }
            let query = window.supabaseAuthPrive.from('login_attempts').select('*').order('attempted_at', { ascending: false }).range(currentPage * pageSize, (currentPage + 1) * pageSize - 1);
            if (currentFilters.email) query = query.ilike('email', `%${currentFilters.email}%`);
            if (currentFilters.success !== null) query = query.eq('success', currentFilters.success);
            if (currentFilters.dateStart) query = query.gte('attempted_at', currentFilters.dateStart + 'T00:00:00');
            if (currentFilters.dateEnd) query = query.lte('attempted_at', currentFilters.dateEnd + 'T23:59:59');
            const { data, error } = await query;
            if (error) { document.getElementById('logsTableBody').innerHTML = '<tr><td colspan="5">Erreur de chargement</td></tr>'; return; }
            if (reset) document.getElementById('logsTableBody').innerHTML = '';
            if (!data || data.length === 0) { if (reset) document.getElementById('logsTableBody').innerHTML = '<tr><td colspan="5">Aucune tentative trouvée</td></tr>'; document.getElementById('loadMoreBtn').style.display = 'none'; return; }
            data.forEach(log => {
                const statusHtml = log.success ? '<span class="success-badge">Succès</span>' : '<span class="failure-badge">Échec</span>';
                const row = `<tr><td>${escapeHtml(log.email)}</td><td>${statusHtml}</td><td>${new Date(log.attempted_at).toLocaleString()}</td><td>${log.ip_address || '-'}</td><td>${log.user_agent ? escapeHtml(log.user_agent).substring(0, 80) : '-'}</td></tr>`;
                document.getElementById('logsTableBody').insertAdjacentHTML('beforeend', row);
            });
            document.getElementById('loadMoreBtn').style.display = data.length < pageSize ? 'none' : 'inline-block';
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : m === '>' ? '&gt;' : m);
        }

        function applyFilters() {
            currentFilters.email = document.getElementById('filterEmail').value.trim();
            const statusVal = document.getElementById('filterStatus').value;
            currentFilters.success = statusVal === '' ? null : (statusVal === 'true');
            currentFilters.dateStart = document.getElementById('filterDateStart').value;
            currentFilters.dateEnd = document.getElementById('filterDateEnd').value;
            loadLogs(true);
        }

        function resetFilters() {
            document.getElementById('filterEmail').value = '';
            document.getElementById('filterStatus').value = '';
            document.getElementById('filterDateStart').value = '';
            document.getElementById('filterDateEnd').value = '';
            currentFilters = { email: '', success: null, dateStart: null, dateEnd: null };
            loadLogs(true);
        }

        document.getElementById('applyFilters').addEventListener('click', applyFilters);
        document.getElementById('resetFilters').addEventListener('click', resetFilters);
        document.getElementById('loadMoreBtn').addEventListener('click', () => { currentPage++; loadLogs(false); });
        loadLogs(true);
    </script>
</body>
</html>
