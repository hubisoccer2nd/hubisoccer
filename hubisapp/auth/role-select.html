<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choix du rôle | HubISoccer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="designauth.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
</head>
<body>
    <div id="globalLoader" style="display: none;"><div class="spinner"></div> Chargement...</div>

    <nav class="navbar">
        <div class="logo" onclick="window.location.href='../../index.html'">
            <img src="logo-navbar.png" alt="HubISoccer">
            <span>HubISoccer</span>
        </div>
        <div class="nav-buttons">
            <a href="../../index.html" class="nav-btn-outline">Accueil</a>
        </div>
    </nav>

    <div class="roles-grid" id="rolesGrid"></div>

    <footer>
        <div class="compliance-badges">
            <div class="badge">© Ozawa-Hubisoccer</div>
            <div class="badge">Triple Projet Sport-Études-Carrière</div>
        </div>
        <div class="contact-box">
            <a href="tel:+2290195973157" class="contact-item">📞 +229 01 95 97 31 57</a>
            <a href="mailto:contacthubisoccer@gmail.com" class="contact-item">📧 contacthubisoccer@gmail.com</a>
        </div>
        <div class="legal">
            <p>HubISoccer - The Hub of Inspiration of Soccer</p>
            <p>RCCM : RB/ABC/24 A 111814 | IFU : 0201910800236</p>
            <p>© 2026 HubISoccer - Ozawa. Tous droits réservés.</p>
        </div>
    </footer>

    <div id="toastContainer" class="toast-container"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const action = urlParams.get('action');
        if (action !== 'login' && action !== 'signup') {
            window.location.href = '../../index.html';
        }

        const roles = [
            { id: 'FT', name: 'Footballeur', icon: 'fas fa-futbol', desc: 'Accédez à votre espace footballeur.' },
            { id: 'BK', name: 'Basketteur', icon: 'fas fa-basketball-ball', desc: 'Espace basket.' },
            { id: 'TN', name: 'Tennisman', icon: 'fas fa-table-tennis', desc: 'Espace tennis.' },
            { id: 'AT', name: 'Athlète', icon: 'fas fa-running', desc: 'Espace athlétisme.' },
            { id: 'HB', name: 'Handballeur', icon: 'fas fa-futbol', desc: 'Espace handball.' },
            { id: 'VB', name: 'Volleyeur', icon: 'fas fa-volleyball-ball', desc: 'Espace volley-ball.' },
            { id: 'RG', name: 'Rugbyman', icon: 'fas fa-football-ball', desc: 'Espace rugby.' },
            { id: 'NA', name: 'Nageur', icon: 'fas fa-swimmer', desc: 'Espace natation.' },
            { id: 'CY', name: 'Cycliste', icon: 'fas fa-bicycle', desc: 'Espace cyclisme.' },
            { id: 'AM', name: 'Arts martiaux', icon: 'fas fa-fist-raised', desc: 'Espace arts martiaux.' },
            { id: 'AR', name: 'Arbitre', icon: 'fas fa-whistle', desc: 'Espace arbitres.' },
            { id: 'CO', name: 'Coach', icon: 'fas fa-chalkboard-user', desc: 'Espace coach.' },
            { id: 'AG', name: 'Agent FIFA', icon: 'fas fa-handshake', desc: 'Espace agent.' },
            { id: 'AC', name: 'Académie', icon: 'fas fa-school', desc: 'Espace académie.' },
            { id: 'SP', name: 'Parrain', icon: 'fas fa-star', desc: 'Espace parrain.' },
            { id: 'SM', name: 'Staff médical', icon: 'fas fa-notes-medical', desc: 'Espace staff médical.' },
            { id: 'TM', name: 'Gestionnaire de tournoi', icon: 'fas fa-trophy', desc: 'Espace tournoi.' }
        ];

        const grid = document.getElementById('rolesGrid');
        roles.forEach(role => {
            const card = document.createElement('div');
            card.className = 'role-card';
            card.innerHTML = `
                <div class="role-icon"><i class="${role.icon}"></i></div>
                <div class="role-title">${role.name}</div>
                <div class="role-desc">${role.desc}</div>
            `;
            card.addEventListener('click', () => {
                if (action === 'login') {
                    window.location.href = `login.html?role=${role.id}`;
                } else if (action === 'signup') {
                    window.location.href = `signup.html?role=${role.id}`;
                }
            });
            grid.appendChild(card);
        });
    </script>
</body>
</html>
