<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouveau mot de passe | HubISoccer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* mêmes styles que reset-password.html */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #ffffff;
            color: #1a1a2e;
            overflow-x: hidden;
        }
        .bg-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        .bg-shapes .shape {
            position: absolute;
            background: rgba(107, 59, 164, 0.05);
            border-radius: 50%;
            filter: blur(80px);
        }
        .shape-1 { width: 500px; height: 500px; top: -200px; left: -200px; }
        .shape-2 { width: 600px; height: 600px; bottom: -200px; right: -200px; background: rgba(107, 59, 164, 0.08); }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 48px;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(107,59,164,0.1);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .logo { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .logo img { height: 42px; }
        .logo span { font-size: 1.4rem; font-weight: 700; color: #6b3ba4; }
        .nav-buttons { display: flex; gap: 16px; }
        .nav-btn-outline {
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: 500;
            text-decoration: none;
            border: 1px solid #6b3ba4;
            color: #6b3ba4;
            background: transparent;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }
        .nav-btn-outline:hover { background: #6b3ba4; color: white; transform: translateY(-2px); }
        .container {
            max-width: 500px;
            margin: 60px auto;
            padding: 0 20px;
        }
        .auth-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 48px 56px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.05), 0 0 0 1px rgba(107,59,164,0.05);
            transition: transform 0.3s ease;
            border: 1px solid rgba(107,59,164,0.15);
        }
        .auth-card h2 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #6b3ba4, #9b6bcd);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 32px;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 500; margin-bottom: 8px; color: #2d2d3a; }
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-wrapper input {
            width: 100%;
            padding: 12px 48px 12px 18px;
            font-size: 1rem;
            border: 1px solid #e2e2f0;
            border-radius: 28px;
            background: #fbfbff;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .input-wrapper input:focus {
            outline: none;
            border-color: #6b3ba4;
            box-shadow: 0 0 0 3px rgba(107,59,164,0.1);
        }
        .input-wrapper .toggle-password {
            position: absolute;
            right: 16px;
            cursor: pointer;
            color: #aaa;
            transition: color 0.2s;
        }
        .input-wrapper .toggle-password:hover { color: #6b3ba4; }
        .password-strength {
            margin-top: 5px;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .strength-bar {
            height: 4px;
            background: #e2e2f0;
            border-radius: 2px;
            flex: 1;
            overflow: hidden;
        }
        .strength-fill {
            height: 100%;
            width: 0%;
            background: #e53e3e;
            transition: width 0.2s;
        }
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: #6b3ba4;
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 12px;
            font-family: 'Inter', sans-serif;
        }
        .btn-submit:hover { background: #552e84; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(107,59,164,0.3); }
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            color: #6b3ba4;
            text-decoration: none;
            font-weight: 500;
        }
        .back-link a:hover { text-decoration: underline; }
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .toast {
            background: white;
            border-radius: 8px;
            padding: 12px 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 10px;
            border-left: 4px solid;
            animation: slideIn 0.3s forwards;
        }
        .toast.success { border-left-color: #28a745; }
        .toast.error { border-left-color: #dc3545; }
        .toast.info { border-left-color: #6b3ba4; }
        .toast.warning { border-left-color: #ffc107; }
        .toast-icon { font-size: 1.2rem; }
        .toast-content { flex: 1; font-size: 0.9rem; color: #333; }
        .toast-close {
            background: none;
            border: none;
            color: #999;
            cursor: pointer;
            font-size: 1rem;
        }
        @keyframes slideIn {
            to { transform: translateX(0); }
        }
        .footer {
            text-align: center;
            padding: 24px;
            font-size: 0.8rem;
            color: #aaa;
            border-top: 1px solid #eee;
            margin-top: 60px;
        }
        @media (max-width: 640px) {
            .navbar { padding: 16px 24px; }
            .auth-card { padding: 32px 24px; margin: 0 16px; }
            .auth-card h2 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>

    <nav class="navbar">
        <div class="logo" onclick="window.location.href='../index.html'">
            <img src="../public/img/logo-navbar.png" alt="HubISoccer">
            <span>HubISoccer</span>
        </div>
        <div class="nav-buttons">
            <a href="../index.html" class="nav-btn-outline">Accueil</a>
        </div>
    </nav>
    <div class="container">
        <div class="auth-card">
            <h2>Nouveau mot de passe</h2>
            <form id="updatePasswordForm">
                <div class="form-group">
                    <label>Nouveau mot de passe</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" required>
                        <i class="fas fa-eye toggle-password" data-target="password"></i>
                    </div>
                    <div class="password-strength">
                        <span>Force :</span>
                        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
                        <span id="strengthText">Faible</span>
                    </div>
                </div>
                <div class="form-group">
                    <label>Confirmer le mot de passe</label>
                    <div class="input-wrapper">
                        <input type="password" id="confirmPassword" required>
                        <i class="fas fa-eye toggle-password" data-target="confirmPassword"></i>
                    </div>
                </div>
                <button type="submit" class="btn-submit">Mettre à jour</button>
            </form>
            <div class="back-link">
                <a href="login.html">Retour à la connexion</a>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>© 2026 HubISoccer - The Hub of Inspiration of Soccer</p>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script src="auth.js"></script>
    <script>
        const passwordInput = document.getElementById('password');
        const strengthFill = document.getElementById('strengthFill');
        const strengthText = document.getElementById('strengthText');

        function checkPasswordStrength(pw) {
            let score = 0;
            if (pw.length >= 8) score++;
            if (/[A-Z]/.test(pw)) score++;
            if (/[a-z]/.test(pw)) score++;
            if (/[0-9]/.test(pw)) score++;
            if (/[^A-Za-z0-9]/.test(pw)) score++;
            const percent = (score / 5) * 100;
            strengthFill.style.width = percent + '%';
            if (score <= 2) { strengthFill.style.background = '#e53e3e'; strengthText.innerText = 'Faible'; }
            else if (score <= 3) { strengthFill.style.background = '#fbbf24'; strengthText.innerText = 'Moyen'; }
            else { strengthFill.style.background = '#10b981'; strengthText.innerText = 'Fort'; }
            return score >= 4;
        }
        passwordInput.addEventListener('input', () => checkPasswordStrength(passwordInput.value));

        document.querySelectorAll('.toggle-password').forEach(icon => {
            icon.addEventListener('click', function() {
                const targetId = this.getAttribute('data-target');
                const input = document.getElementById(targetId);
                if (input) {
                    const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
                    input.setAttribute('type', type);
                    this.classList.toggle('fa-eye-slash');
                }
            });
        });

        document.getElementById('updatePasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            if (!password || !confirm) {
                showToast('Veuillez remplir tous les champs', 'warning');
                return;
            }
            if (password !== confirm) {
                showToast('Les mots de passe ne correspondent pas', 'warning');
                return;
            }
            if (!checkPasswordStrength(password)) {
                showToast('Le mot de passe doit comporter au moins 8 caractères, incluant majuscule, minuscule, chiffre et symbole', 'error');
                return;
            }
            showLoader();
            try {
                const { error } = await window.supabaseAuthPrive.auth.updateUser({ password });
                if (error) throw error;
                showToast('Mot de passe mis à jour avec succès', 'success');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            } catch (err) {
                showToast(err.message, 'error');
            } finally {
                hideLoader();
            }
        });
    </script>
</body>
</html>
