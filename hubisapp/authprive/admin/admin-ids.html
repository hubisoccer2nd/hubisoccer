<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Gestion des IDs | HubISoccer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
            padding: 40px 5%;
        }
        :root {
            --primary: #551B8C;
            --primary-light: #7e3db0;
            --gold: #FFCC00;
            --gold-dark: #e6b800;
            --bg-light: #F0F8FF;
            --white: #fff;
            --dark: #1a1a1a;
            --gray: #6c757d;
            --light-gray: #e9ecef;
            --shadow: 0 10px 30px rgba(0,0,0,0.05);
            --shadow-hover: 0 15px 40px rgba(85,27,140,0.15);
            --transition: all 0.3s ease;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: var(--primary); font-size: 2rem; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
        .subtitle { color: var(--gray); margin-bottom: 30px; border-left: 4px solid var(--gold); padding-left: 15px; }
        .glass-card {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(8px);
            border-radius: 30px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255,255,255,0.5);
        }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: var(--dark); }
        select, input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid var(--light-gray);
            border-radius: 30px;
            font-family: 'Poppins', sans-serif;
            transition: var(--transition);
        }
        select:focus, input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 4px rgba(85,27,140,0.1); }
        .btn-generate, .btn-save, .btn-refresh {
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: none;
        }
        .btn-generate { background: var(--primary); color: white; }
        .btn-generate:hover { background: var(--primary-light); transform: translateY(-2px); }
        .btn-save { background: var(--gold); color: black; }
        .btn-save:hover { background: var(--gold-dark); transform: translateY(-2px); }
        .btn-refresh { background: var(--light-gray); color: var(--primary); }
        .generated-id {
            background: var(--bg-light);
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
            font-family: monospace;
            font-size: 1rem;
            word-break: break-all;
            border: 1px dashed var(--primary);
        }
        .ids-list { background: white; border-radius: 20px; padding: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--light-gray); }
        th { background: var(--bg-light); color: var(--primary); }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
        .status-disponible { background: #d4edda; color: #155724; }
        .status-utilise { background: #fff3cd; color: #856404; }
        .status-bloque { background: #f8d7da; color: #721c24; }
        .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; }
        .toast { background: white; border-radius: 12px; padding: 12px 20px; margin-top: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); border-left: 4px solid; animation: slideIn 0.3s ease; }
        .toast.success { border-left-color: #28a745; }
        .toast.error { border-left-color: #dc3545; }
        .toast.warning { border-left-color: #ffc107; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .flex-buttons { display: flex; gap: 15px; flex-wrap: wrap; margin-top: 20px; }
    </style>
</head>
<body>
<div class="container">
    <h1><i class="fas fa-id-card"></i> Gestion des IDs HubISoccer</h1>
    <div class="subtitle">Générez des identifiants uniques de 40 caractères (dispersion HU/BI/S/O) et assignez-les aux rôles.</div>

    <div class="glass-card">
        <h2><i class="fas fa-magic"></i> Générer un nouvel ID</h2>
        <div class="form-group">
            <label>Rôle</label>
            <select id="roleCode">
                <option value="FOOT">Footballeur</option><option value="BASK">Basketteur</option><option value="TENN">Tennisman</option>
                <option value="ATHL">Athlète</option><option value="HANDB">Handballeur</option><option value="VOLL">Volleyeur</option>
                <option value="RUGBY">Rugbyman</option><option value="NATA">Nageur</option><option value="ARTSM">Arts martiaux</option>
                <option value="CYCL">Cycliste</option><option value="CHAN">Chanteur</option><option value="DANS">Danseur</option>
                <option value="COMP">Compositeur</option><option value="ACIN">Acteur cinéma</option><option value="ATHE">Acteur théâtre</option>
                <option value="HUMO">Humoriste</option><option value="SLAM">Slameur</option><option value="DJ">DJ / Producteur</option>
                <option value="CIRQ">Artiste de cirque</option><option value="VISU">Artiste visuel</option><option value="PARRAIN">Parrain</option>
                <option value="AGENT">Agent FIFA</option><option value="COACH">Coach</option><option value="MEDIC">Staff médical</option>
                <option value="ARBIT">Corps arbitral</option><option value="ACAD">Académie sportive</option><option value="FORM">Formateur</option>
                <option value="TOURN">Gestionnaire tournoi</option>
            </select>
        </div>
        <div class="form-group">
            <label>Pays (code 2 lettres)</label>
            <input type="text" id="countryCode" placeholder="BJ, FR, SN, ..." maxlength="2" style="text-transform:uppercase">
        </div>
        <button id="generateBtn" class="btn-generate"><i class="fas fa-sync-alt"></i> Générer un ID</button>
        <div id="generatedIdContainer" class="generated-id" style="display: none;">
            <strong>ID généré :</strong><br><span id="generatedId"></span>
        </div>
        <div class="flex-buttons">
            <button id="saveIdBtn" class="btn-save" style="display: none;"><i class="fas fa-save"></i> Enregistrer</button>
            <button id="copyIdBtn" class="btn-generate" style="display: none;"><i class="fas fa-copy"></i> Copier</button>
        </div>
    </div>

    <div class="glass-card">
        <h2><i class="fas fa-list"></i> IDs existants</h2>
        <button id="refreshListBtn" class="btn-refresh"><i class="fas fa-sync-alt"></i> Rafraîchir</button>
        <div id="idsList" class="ids-list"><p>Chargement...</p></div>
    </div>
</div>
<div id="toastContainer" class="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://nvorqhmpnwtfjlbzzuqp.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im52b3JxaG1wbnd0ZmpsYnp6dXFwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2MDQwMzQsImV4cCI6MjA5MTE4MDAzNH0.Z5IPXZY2MFfdtEazLL405A5fTthdbKkDLV3GXhQDJMo';
    const supabaseAuthUser = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const EDGE_FUNCTION_URL = 'https://nvorqhmpnwtfjlbzzuqp.supabase.co/functions/v1/manage-ids';

    let currentGeneratedId = null;
    let currentRole = null;

    function showToast(message, type) {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = `<div>${message}</div>`;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    // Charger la liste des IDs
    async function loadIds() {
        const container = document.getElementById('idsList');
        container.innerHTML = '<p>Chargement...</p>';
        const { data, error } = await supabaseAuthUser
            .from('private_auth.hubisoccer_ids')
            .select('*')
            .order('created_at', { ascending: false });
        if (error) {
            container.innerHTML = '<p>Erreur chargement</p>';
            showToast(error.message, 'error');
            return;
        }
        if (!data || data.length === 0) {
            container.innerHTML = '<p>Aucun ID généré pour le moment.</p>';
            return;
        }
        let html = '<table><thead><tr><th>ID</th><th>Rôle</th><th>Statut</th><th>Créé le</th></tr></thead><tbody>';
        data.forEach(row => {
            let statusClass = '';
            if (row.status === 'disponible') statusClass = 'status-disponible';
            else if (row.status === 'utilise') statusClass = 'status-utilise';
            else statusClass = 'status-bloque';
            html += `<tr>
                <td><code>${row.hubisoccer_id}</code></td>
                <td>${row.role_code}</td>
                <td><span class="status-badge ${statusClass}">${row.status}</span></td>
                <td>${new Date(row.created_at).toLocaleString()}</td>
            </tr>`;
        });
        html += '</tbody></table>';
        container.innerHTML = html;
    }

    // Générer un ID via Edge Function
    async function generateId(roleCode, countryCode) {
        const response = await fetch(EDGE_FUNCTION_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'generate', roleCode, countryCode: countryCode || 'BJ' })
        });
        if (!response.ok) {
            const err = await response.json();
            throw new Error(err.error || 'Erreur génération');
        }
        const data = await response.json();
        return data.id;
    }

    // Sauvegarder un ID via Edge Function
    async function saveId(hubisoccer_id, roleCode) {
        const response = await fetch(EDGE_FUNCTION_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'save', hubisoccer_id, roleCode })
        });
        if (!response.ok) {
            const err = await response.json();
            throw new Error(err.error || 'Erreur sauvegarde');
        }
        return true;
    }

    // Événements
    document.getElementById('generateBtn').addEventListener('click', async () => {
        const roleCode = document.getElementById('roleCode').value;
        const countryCode = document.getElementById('countryCode').value.trim().toUpperCase();
        if (!roleCode) {
            showToast('Veuillez sélectionner un rôle', 'warning');
            return;
        }
        showToast('Génération en cours...', 'info');
        try {
            const generated = await generateId(roleCode, countryCode);
            currentGeneratedId = generated;
            currentRole = roleCode;
            document.getElementById('generatedId').textContent = generated;
            document.getElementById('generatedIdContainer').style.display = 'block';
            document.getElementById('saveIdBtn').style.display = 'inline-flex';
            document.getElementById('copyIdBtn').style.display = 'inline-flex';
            showToast('ID généré avec succès', 'success');
        } catch (err) {
            showToast(err.message, 'error');
        }
    });

    document.getElementById('saveIdBtn').addEventListener('click', async () => {
        if (!currentGeneratedId || !currentRole) {
            showToast('Aucun ID à enregistrer', 'warning');
            return;
        }
        showToast('Enregistrement...', 'info');
        try {
            await saveId(currentGeneratedId, currentRole);
            showToast('ID enregistré dans la base', 'success');
            document.getElementById('generatedIdContainer').style.display = 'none';
            document.getElementById('saveIdBtn').style.display = 'none';
            document.getElementById('copyIdBtn').style.display = 'none';
            currentGeneratedId = null;
            currentRole = null;
            loadIds(); // rafraîchir la liste
        } catch (err) {
            showToast(err.message, 'error');
        }
    });

    document.getElementById('copyIdBtn').addEventListener('click', () => {
        if (currentGeneratedId) {
            navigator.clipboard.writeText(currentGeneratedId);
            showToast('ID copié dans le presse-papier', 'success');
        }
    });

    document.getElementById('refreshListBtn').addEventListener('click', () => loadIds());

    // Chargement initial
    loadIds();
</script>
</body>
</html>
