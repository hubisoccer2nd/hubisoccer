            font-weight: 500;

        /* ----- MAIN CONTENT ----- */

            flex: 1;
        }
        h1 {

            margin-bottom: 10px;

            align-items: center;
            gap: 10px;

        .subtitle {
            color: var(--gray);
            margin-bottom: 30px;

        .glass-card {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(8px);
            border-radius: 30px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
        }
        .filters {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            align-items: center;
        }
        .filters input, .filters select {
            padding: 10px 15px;
            border-radius: 30px;
            border: 1px solid var(--light-gray);
            background: white;
            font-family: 'Poppins', sans-serif;
        }
        .btn-refresh {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 500;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-refresh:hover {
            background: var(--primary-light);
            transform: translateY(-2px);
        }
        .logs-list {
            background: white;
            border-radius: 20px;
            padding: 20px;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--light-gray);
        }
        th {
            background: var(--bg-light);
            color: var(--primary);
            font-weight: 600;
        }
        .badge-action {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            background: #e9ecef;
            color: var(--dark);
        }

        /* ----- FOOTER ADMINISTRATION ----- */
        .admin-footer {
            background: var(--white);
            padding: 1.2rem 5%;
            border-top: 1px solid var(--light-gray);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--gray);
        }
        .footer-links {
            display: flex;
            gap: 1.5rem;
        }
        .footer-links a {
            color: var(--gray);
            text-decoration: none;
            transition: var(--transition);
        }
        .footer-links a:hover {
            color: var(--primary);
        }

        /* ----- TOAST ----- */
        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
        }
        .toast {
            background: white;
            border-radius: 12px;
            padding: 12px 20px;
            margin-top: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            border-left: 4px solid;
            animation: slideIn 0.3s ease;
        }
        .toast.success { border-left-color: #28a745; }
        .toast.error { border-left-color: #dc3545; }
        .toast.warning { border-left-color: #ffc107; }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* ----- RESPONSIVE ----- */
        @media (max-width: 700px) {
            .nav-links { display: none; }
            .filters { flex-direction: column; align-items: stretch; }
            .admin-footer {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }
            .footer-links {
                flex-wrap: wrap;
                justify-content: center;
            }
        }

        /* Cache le contenu tant que l'admin n'est pas validé */
        #mainContent {
            display: none;
        }
    </style>
</head>
<body>

<!-- ===== CONTENU PRINCIPAL (masqué jusqu'à validation admin) ===== -->
<div id="mainContent">
    <div class="admin-container">
        <h1><i class="fas fa-history"></i> Logs système</h1>
        <div class="subtitle">Historique des actions importantes (connexions, générations d'IDs, modifications)</div>

        <div class="glass-card">
            <div class="filters">
                <input type="text" id="searchUser" placeholder="Rechercher par email ou nom..." style="flex:2;">
                <select id="filterAction" style="flex:1;">
                    <option value="">Toutes les actions</option>
                    <option value="LOGIN">Connexion</option>
                    <option value="LOGOUT">Déconnexion</option>
                    <option value="GENERATE_ID">Génération ID</option>
                    <option value="SAVE_ID">Enregistrement ID</option>

                </select>
                <button id="refreshBtn" class="btn-refresh"><i class="fas fa-sync-alt"></i> Rafraîchir</button>
            </div>

<!-- ===== TOAST ===== -->
<div id="toastContainer" class="toast-container"></div>

<script>
    // Récupération du client Supabase et de l'utilisateur courant
    const supabaseAuth = window.__SUPABASE_CLIENT;
    const currentUser = window.__CURRENT_USER;

    let allLogs = [];

    // ----- FONCTIONS UTILITAIRES -----
    function showToast(message, type = 'info') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = `<div>${message}</div>`;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 4000);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }

    // ----- CHARGER LES LOGS -----
    async function loadLogs() {
        const container = document.getElementById('logsList');
        container.innerHTML = '<p><i class="fas fa-spinner fa-spin"></i> Chargement des logs...</p>';
        try {
            // Requête avec jointure sur les profils (via auth_uuid)
            const { data, error } = await supabaseAuth
                .from('supabaseAuthPrive_admin_logs')
                .select(`
                    id,
                    user_id,
                    action,
                    details,
                    ip,
                    created_at,
                    profiles:supabaseAuthPrive_profiles!user_id(display_name, email)
                `)
                .order('created_at', { ascending: false });

            if (error) {
                // Si la table n'existe pas encore
                if (error.code === '42P01') {
                    container.innerHTML = '<p>La table des logs n\'existe pas encore. Elle sera créée lors de l\'initialisation de la base de données.</p>';
                    showToast('Table des logs non trouvée. Exécutez le script SQL approprié.', 'warning');
                    allLogs = [];
                    return;
                }
                throw error;
            }

            allLogs = data || [];
            renderLogs();
        } catch (err) {
            console.error(err);
            container.innerHTML = '<p>Erreur lors du chargement des logs.</p>';
            showToast(err.message, 'error');
        }
    }

    // ----- AFFICHER LES LOGS AVEC FILTRES -----
    function renderLogs() {
        const search = document.getElementById('searchUser').value.toLowerCase();
        const actionFilter = document.getElementById('filterAction').value;

        let filtered = allLogs.filter(log => {
            const profile = log.profiles || {};
            const userMatch = (profile.display_name || '').toLowerCase().includes(search) ||
                              (profile.email || '').toLowerCase().includes(search) ||
                              (log.user_id || '').toLowerCase().includes(search);
            const actionMatch = !actionFilter || log.action === actionFilter;
            return userMatch && actionMatch;
        });

        const container = document.getElementById('logsList');

        if (filtered.length === 0) {
            container.innerHTML = '<p>Aucun log ne correspond aux critères.</p>';
            return;
        }

        let html = '<table><thead><tr><th>Date/Heure</th><th>Utilisateur</th><th>Action</th><th>Détails</th><th>IP</th></tr></thead><tbody>';
        for (const log of filtered) {
            const profile = log.profiles || {};
            const userName = profile.display_name || profile.email || log.user_id?.substring(0, 8) || 'Système';
            html += `<tr>
                <td>${new Date(log.created_at).toLocaleString()}</td>
                <td>${escapeHtml(userName)}</td>
                <td><span class="badge-action">${escapeHtml(log.action)}</span></td>
                <td>${escapeHtml(log.details || '—')}</td>
                <td>${escapeHtml(log.ip || '—')}</td>
            </tr>`;
        }
        html += '</tbody></table>';
        container.innerHTML = html;
    }

    // ----- FONCTION UTILITAIRE POUR ÉCRIRE UN LOG (à appeler depuis d'autres pages) -----
    // Cette fonction peut être exportée ou utilisée globalement
    async function logAdminAction(action, details = null) {
        if (!currentUser) return;
        try {
            // Récupération de l'IP (approximation via service externe ou laissé vide)
            const ip = ''; // Optionnel : peut être récupéré via une API
            const { error } = await supabaseAuth
                .from('supabaseAuthPrive_admin_logs')
                .insert({
                    user_id: currentUser.id,
                    action: action,
                    details: details,
                    ip: ip,
                    created_at: new Date().toISOString()
                });
            if (error) console.warn('Échec écriture log:', error);
        } catch (err) {
            console.warn('Erreur logAdminAction:', err);
        }
    }

    // Exposer la fonction pour les autres scripts
    window.logAdminAction = logAdminAction;

    // ----- ÉVÉNEMENTS -----
    document.getElementById('refreshBtn').addEventListener('click', loadLogs);
    document.getElementById('searchUser').addEventListener('input', renderLogs);
    document.getElementById('filterAction').addEventListener('change', renderLogs);

    document.getElementById('logoutBtn').addEventListener('click', async () => {
        // Logger la déconnexion avant de se déconnecter
        await logAdminAction('LOGOUT', 'Déconnexion manuelle');
        await supabaseAuth.auth.signOut();
        window.location.href = '../users/login.html';
    });

    // Chargement initial
    loadLogs();
</script>
</body>
