<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Gestion des utilisateurs | HubISoccer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
            padding: 20px;
        }
        :root {
            --primary: #551B8C;
            --primary-light: #7e3db0;
            --gold: #FFCC00;
            --gold-dark: #e6b800;
            --bg-light: #F0F8FF;
            --white: #fff;
            --dark: #1a1a1a;
            --gray: #6c757d;
            --light-gray: #e9ecef;
            --shadow: 0 10px 30px rgba(0,0,0,0.05);
            --shadow-hover: 0 15px 40px rgba(85,27,140,0.15);
            --transition: all 0.3s ease;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: var(--primary); font-size: 2rem; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
        .subtitle { color: var(--gray); margin-bottom: 30px; border-left: 4px solid var(--gold); padding-left: 15px; }
        .glass-card {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(8px);
            border-radius: 30px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
        }
        .search-bar { margin-bottom: 20px; display: flex; gap: 15px; flex-wrap: wrap; }
        .search-bar input { flex: 1; padding: 12px 15px; border-radius: 30px; border: 1px solid var(--light-gray); }
        .btn-refresh { background: var(--primary-light); color: white; border: none; padding: 12px 20px; border-radius: 30px; cursor: pointer; }
        .users-list { background: white; border-radius: 20px; padding: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--light-gray); }
        th { background: var(--bg-light); color: var(--primary); }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
        .status-active { background: #d4edda; color: #155724; }
        .status-disabled { background: #f8d7da; color: #721c24; }
        .btn-edit, .btn-toggle {
            padding: 6px 12px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-weight: 500;
            margin: 0 4px;
        }
        .btn-edit { background: var(--primary); color: white; }
        .btn-toggle { background: var(--gold); color: black; }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white;
            border-radius: 30px;
            padding: 30px;
            max-width: 450px;
            width: 90%;
        }
        .modal-content h3 { color: var(--primary); margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; }
        select, input { width: 100%; padding: 10px; border-radius: 30px; border: 1px solid var(--light-gray); }
        .btn-save { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer; }
        .close-modal { float: right; font-size: 1.5rem; cursor: pointer; }
        .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; }
        .toast { background: white; border-radius: 12px; padding: 12px 20px; margin-top: 10px; border-left: 4px solid; animation: slideIn 0.3s; }
        .toast.success { border-left-color: #28a745; }
        .toast.error { border-left-color: #dc3545; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>
<div class="container">
    <h1><i class="fas fa-users-cog"></i> Gestion des utilisateurs</h1>
    <div class="subtitle">Consultez, modifiez les rôles et activez/désactivez les comptes.</div>

    <div class="glass-card">
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Rechercher par email, nom ou ID...">
            <button id="refreshBtn" class="btn-refresh"><i class="fas fa-sync-alt"></i> Rafraîchir</button>
        </div>
        <div id="usersList" class="users-list">Chargement...</div>
    </div>
</div>

<div id="toastContainer" class="toast-container"></div>

<!-- Modale d'édition du rôle -->
<div id="roleModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" id="closeRoleModal">&times;</span>
        <h3><i class="fas fa-tag"></i> Modifier le rôle</h3>
        <input type="hidden" id="editUserId">
        <div class="form-group">
            <label>Nouveau rôle</label>
            <select id="editRoleCode">
                <option value="FOOT">Footballeur</option><option value="BASK">Basketteur</option><option value="TENN">Tennisman</option>
                <option value="ATHL">Athlète</option><option value="HANDB">Handballeur</option><option value="VOLL">Volleyeur</option>
                <option value="RUGBY">Rugbyman</option><option value="NATA">Nageur</option><option value="ARTSM">Arts martiaux</option>
                <option value="CYCL">Cycliste</option><option value="CHAN">Chanteur</option><option value="DANS">Danseur</option>
                <option value="COMP">Compositeur</option><option value="ACIN">Acteur cinéma</option><option value="ATHE">Acteur théâtre</option>
                <option value="HUMO">Humoriste</option><option value="SLAM">Slameur</option><option value="DJ">DJ</option>
                <option value="CIRQ">Cirque</option><option value="VISU">Artiste visuel</option><option value="PARRAIN">Parrain</option>
                <option value="AGENT">Agent FIFA</option><option value="COACH">Coach</option><option value="MEDIC">Staff médical</option>
                <option value="ARBIT">Arbitre</option><option value="ACAD">Académie</option><option value="FORM">Formateur</option>
                <option value="TOURN">Gestionnaire tournoi</option>
            </select>
        </div>
        <button id="saveRoleBtn" class="btn-save">Enregistrer</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://nvorqhmpnwtfjlbzzuqp.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im52b3JxaG1wbnd0ZmpsYnp6dXFwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2MDQwMzQsImV4cCI6MjA5MTE4MDAzNH0.Z5IPXZY2MFfdtEazLL405A5fTthdbKkDLV3GXhQDJMo';
    const supabaseAuthUser = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const EDGE_FUNCTION_URL = 'https://nvorqhmpnwtfjlbzzuqp.supabase.co/functions/v1/manage-users';

    let allUsers = [];

    function showToast(message, type) {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = `<div>${message}</div>`;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    async function loadUsers() {
        const container = document.getElementById('usersList');
        container.innerHTML = 'Chargement...';
        try {
            // Récupérer les profils
            const { data: profiles, error: profilesError } = await supabaseAuthUser
                .from('private_auth.profiles')
                .select('*')
                .order('created_at', { ascending: false });
            if (profilesError) throw profilesError;
            allUsers = profiles || [];
            renderUsers();
        } catch (err) {
            container.innerHTML = '<p>Erreur chargement</p>';
            showToast(err.message, 'error');
        }
    }

    function renderUsers() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        let filtered = allUsers.filter(u => 
            u.display_name?.toLowerCase().includes(searchTerm) ||
            u.hubisoccer_id?.toLowerCase().includes(searchTerm)
        );
        const container = document.getElementById('usersList');
        if (filtered.length === 0) {
            container.innerHTML = '<p>Aucun utilisateur trouvé.</p>';
            return;
        }
        let html = '<table><thead><tr><th>Nom</th><th>ID HubISoccer</th><th>Rôle</th><th>Statut</th><th>Actions</th></tr></thead><tbody>';
        for (const user of filtered) {
            // Pour savoir si l'utilisateur est actif, on aurait besoin d'aller chercher auth.users
            // Par défaut, on suppose actif. On peut afficher un badge.
            const statusClass = 'status-active';
            const statusText = 'Actif';
            html += `<tr>
                <td>${escapeHtml(user.display_name || 'N/A')}</td>
                <td><code>${escapeHtml(user.hubisoccer_id)}</code></td>
                <td>${escapeHtml(user.role_code)}</td>
                <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                <td>
                    <button class="btn-edit" data-id="${user.id}" data-role="${user.role_code}"><i class="fas fa-edit"></i> Rôle</button>
                    <button class="btn-toggle" data-id="${user.id}" data-active="true"><i class="fas fa-ban"></i> Désactiver</button>
                </td>
            </tr>`;
        }
        html += '</tbody></table>';
        container.innerHTML = html;
        // Attacher événements
        document.querySelectorAll('.btn-edit').forEach(btn => {
            btn.addEventListener('click', () => openRoleModal(btn.dataset.id, btn.dataset.role));
        });
        document.querySelectorAll('.btn-toggle').forEach(btn => {
            btn.addEventListener('click', () => toggleUser(btn.dataset.id, btn.dataset.active === 'true'));
        });
    }

    function openRoleModal(userId, currentRole) {
        document.getElementById('editUserId').value = userId;
        const select = document.getElementById('editRoleCode');
        select.value = currentRole;
        document.getElementById('roleModal').classList.add('active');
    }

    async function updateRole(userId, roleCode) {
        const response = await fetch(EDGE_FUNCTION_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'updateRole', user_id: userId, role_code: roleCode })
        });
        if (!response.ok) {
            const err = await response.json();
            throw new Error(err.error || 'Erreur mise à jour');
        }
        return true;
    }

    async function toggleUser(userId, isActive) {
        const newState = !isActive;
        const response = await fetch(EDGE_FUNCTION_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'toggleActive', user_id: userId, is_active: newState })
        });
        if (!response.ok) {
            const err = await response.json();
            throw new Error(err.error || 'Erreur modification');
        }
        return true;
    }

    document.getElementById('saveRoleBtn').addEventListener('click', async () => {
        const userId = document.getElementById('editUserId').value;
        const roleCode = document.getElementById('editRoleCode').value;
        try {
            await updateRole(userId, roleCode);
            showToast('Rôle mis à jour', 'success');
            document.getElementById('roleModal').classList.remove('active');
            loadUsers();
        } catch (err) {
            showToast(err.message, 'error');
        }
    });

    document.getElementById('refreshBtn').addEventListener('click', loadUsers);
    document.getElementById('searchInput').addEventListener('input', renderUsers);
    document.getElementById('closeRoleModal').addEventListener('click', () => {
        document.getElementById('roleModal').classList.remove('active');
    });
    window.addEventListener('click', (e) => {
        if (e.target === document.getElementById('roleModal')) {
            document.getElementById('roleModal').classList.remove('active');
        }
    });

    function escapeHtml(str) { return str?.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])) || ''; }

    loadUsers();
</script>
</body>
</html>
