<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Vérifications & Licences | HubISoccer</title>
    <!-- Polices et icônes -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- CSS local -->
    <link rel="stylesheet" href="admin-verif.css">
    <!-- SDK Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- ===== DEBUT LOADER GLOBAL ===== -->
<div id="globalLoader" class="global-loader" style="display:none;">
    <div class="loader-inner"><div class="spinner"></div><p class="loader-text">Chargement…</p></div>
</div>
<!-- ===== FIN LOADER GLOBAL ===== -->

<!-- ===== DEBUT NAVBAR ===== -->
<nav class="admin-nav">
    <div class="nav-left" onclick="window.location.href='../../../index.html'" style="cursor: pointer;">
        <img src="../../../img/logo-navbar.png" alt="HubISoccer" class="logo-nav">
        <span class="admin-title">Administration - Vérifications & Licences</span>
    </div>
    <div class="nav-right">
        <span class="user-name" id="userName">Admin</span>
        <button class="logout-link" id="logoutBtn">Déconnexion</button>
    </div>
</nav>
<!-- ===== FIN NAVBAR ===== -->

<!-- ===== DEBUT CONTENU PRINCIPAL ===== -->
<main class="admin-main">
    <div class="admin-container">
        <div class="admin-header">
            <h1><i class="fas fa-shield-alt"></i> Gestion des vérifications</h1>
            <button class="btn-refresh" id="refreshBtn"><i class="fas fa-sync-alt"></i> Rafraîchir</button>
        </div>

        <!-- Onglets -->
        <div class="admin-tabs">
            <button class="tab-btn active" data-tab="licenses"><i class="fas fa-id-card"></i> Demandes de licence</button>
            <button class="tab-btn" data-tab="documents"><i class="fas fa-file-alt"></i> Documents</button>
            <button class="tab-btn" data-tab="history"><i class="fas fa-history"></i> Historique</button>
        </div>

        <!-- Panneau de recherche -->
        <div class="search-panel" id="searchPanel">
            <input type="text" id="searchInput" placeholder="Rechercher par nom, email ou ID...">
            <select id="filterSelect">
                <option value="all">Tous les statuts</option>
                <option value="pending">En attente</option>
                <option value="approved">Validé</option>
                <option value="rejected">Rejeté</option>
            </select>
        </div>

        <!-- Contenu des onglets -->
        <div id="tab-licenses" class="tab-content active">
            <div id="licensesList" class="admin-list"></div>
        </div>
        <div id="tab-documents" class="tab-content">
            <div id="documentsList" class="admin-list"></div>
        </div>
        <div id="tab-history" class="tab-content">
            <div id="historyList" class="admin-list"></div>
        </div>
    </div>
</main>
<!-- ===== FIN CONTENU PRINCIPAL ===== -->

<!-- ===== MODALES ===== -->
<!-- Modale détail licence -->
<div id="licenseModal" class="modal">
    <div class="modal-content large">
        <div class="modal-header">
            <h2>Détail de la demande de licence</h2>
            <span class="close-modal" onclick="closeLicenseModal()">&times;</span>
        </div>
        <div class="modal-body" id="licenseModalBody"></div>
        <div class="modal-actions" id="licenseModalActions"></div>
    </div>
</div>

<!-- Modale détail document -->
<div id="documentModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Détail du document</h2>
            <span class="close-modal" onclick="closeDocumentModal()">&times;</span>
        </div>
        <div class="modal-body" id="documentModalBody"></div>
        <div class="modal-actions" id="documentModalActions"></div>
    </div>
</div>

<!-- Modale édition licence -->
<div id="editLicenseModal" class="modal">
    <div class="modal-content large">
        <div class="modal-header">
            <h2>Modifier la demande de licence</h2>
            <span class="close-modal" onclick="closeEditLicenseModal()">&times;</span>
        </div>
        <div class="modal-body">
            <form id="editLicenseForm">
                <div class="form-row">
                    <div class="form-group"><label>Nom</label><input type="text" id="edit_nom" required></div>
                    <div class="form-group"><label>Prénom</label><input type="text" id="edit_prenom" required></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Date de naissance</label><input type="date" id="edit_date_naissance" required></div>
                    <div class="form-group"><label>Lieu de naissance</label><input type="text" id="edit_lieu_naissance" required></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Adresse</label><input type="text" id="edit_adresse" required></div>
                    <div class="form-group"><label>Nationalité</label><input type="text" id="edit_nationalite" required></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Pays</label><input type="text" id="edit_pays" required></div>
                    <div class="form-group"><label>Langue(s)</label><input type="text" id="edit_langue"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Téléphone</label><input type="tel" id="edit_telephone" required></div>
                    <div class="form-group"><label>Email</label><input type="email" id="edit_email"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Taille (cm)</label><input type="number" id="edit_taille"></div>
                    <div class="form-group"><label>Poids (kg)</label><input type="number" id="edit_poids"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Pied fort</label>
                        <select id="edit_pied_fort">
                            <option value="">Sélectionnez</option>
                            <option>Droitier</option>
                            <option>Gaucher</option>
                            <option>Ambidextre</option>
                        </select>
                    </div>
                    <div class="form-group"><label>Club</label><input type="text" id="edit_club"></div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="closeEditLicenseModal()">Annuler</button>
                    <button type="submit" class="btn-confirm">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Modale confirmation -->
<div id="confirmModal" class="modal">
    <div class="modal-content small">
        <div class="modal-header">
            <h2>Confirmation</h2>
            <span class="close-modal" onclick="closeConfirmModal()">&times;</span>
        </div>
        <div class="modal-body">
            <p id="confirmModalMessage">Êtes-vous sûr de vouloir effectuer cette action ?</p>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeConfirmModal()">Annuler</button>
                <button class="btn-confirm" id="confirmActionBtn">Confirmer</button>
            </div>
        </div>
    </div>
</div>

<!-- Toast container -->
<div id="toastContainer" class="toast-container"></div>

<!-- ===== SCRIPT ===== -->
<script src="admin-verif.js"></script>
</body>
</html>
