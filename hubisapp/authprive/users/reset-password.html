<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réinitialisation du mot de passe | HubISoccer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        :root {
            --primary: #551B8C;
            --primary-light: #7e3db0;
            --primary-dark: #3d1266;
            --gold: #FFCC00;
            --gold-dark: #e6b800;
            --bg-light: #F0F8FF;
            --white: #ffffff;
            --dark: #1a1a1a;
            --gray: #6c757d;
            --light-gray: #e9ecef;
            --shadow: 0 10px 30px rgba(0,0,0,0.05);
            --shadow-hover: 0 15px 40px rgba(85,27,140,0.15);
            --transition: all 0.3s ease;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 30px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 25px 45px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.3);
        }

        h1 {
            font-size: 1.8rem;
            color: var(--primary);
            text-align: center;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: var(--gray);
            margin-bottom: 30px;
            font-size: 0.85rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--dark);
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid var(--light-gray);
            border-radius: 30px;
            font-family: 'Poppins', sans-serif;
            transition: var(--transition);
        }

        input:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 4px rgba(85,27,140,0.1);
        }

        .btn-submit {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 50px;
            width: 100%;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-submit:hover {
            background: var(--primary-light);
            transform: translateY(-2px);
        }

        .info-text {
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
        }

        .info-text a {
            color: var(--primary);
            text-decoration: none;
        }

        .info-text a:hover {
            text-decoration: underline;
        }

        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
        }

        .toast {
            background: white;
            border-radius: 12px;
            padding: 12px 20px;
            margin-top: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            border-left: 4px solid;
            animation: slideIn 0.3s ease;
        }

        .toast.success { border-left-color: #28a745; }
        .toast.error { border-left-color: #dc3545; }
        .toast.warning { border-left-color: #ffc107; }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
<div class="glass-card">
    <h1><i class="fas fa-key"></i> Mot de passe oublié</h1>
    <p class="subtitle">Saisissez votre email, un lien de réinitialisation vous sera envoyé.</p>
    <form id="resetForm">
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" required>
        </div>
        <button type="submit" class="btn-submit">Envoyer le lien</button>
    </form>
    <div class="info-text">
        <a href="login.html">Retour à la connexion</a>
    </div>
</div>
<div id="toastContainer" class="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://nvorqhmpnwtfjlbzzuqp.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im52b3JxaG1wbnd0ZmpsYnp6dXFwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2MDQwMzQsImV4cCI6MjA5MTE4MDAzNH0.Z5IPXZY2MFfdtEazLL405A5fTthdbKkDLV3GXhQDJMo';
    const supabaseAuthUser = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function showToast(message, type = 'info') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = `<div>${message}</div>`;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    document.getElementById('resetForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        if (!email) {
            showToast('Veuillez saisir votre email', 'warning');
            return;
        }
        showToast('Envoi en cours...', 'info');
        const { error } = await supabaseAuthUser.auth.resetPasswordForEmail(email, {
            redirectTo: window.location.origin + '/hubisapp/authprive/users/update-password.html'
        });
        if (error) {
            showToast(error.message, 'error');
            return;
        }
        showToast('Un lien de réinitialisation a été envoyé à votre adresse email.', 'success');
        setTimeout(() => { window.location.href = 'login.html'; }, 3000);
    });
</script>
</body>
</html>
