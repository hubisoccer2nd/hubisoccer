<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription | HubISoccer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        :root {
            --primary: #551B8C;
            --primary-light: #7e3db0;
            --primary-dark: #3d1266;
            --gold: #FFCC00;
            --gold-dark: #e6b800;
            --bg-light: #F0F8FF;
            --white: #ffffff;
            --dark: #1a1a1a;
            --gray: #6c757d;
            --light-gray: #e9ecef;
            --shadow: 0 10px 30px rgba(0,0,0,0.05);
            --shadow-hover: 0 15px 40px rgba(85,27,140,0.15);
            --transition: all 0.3s ease;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 25px 45px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.3);
        }

        h1 {
            font-size: 1.8rem;
            color: var(--primary);
            text-align: center;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--dark);
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid var(--light-gray);
            border-radius: 30px;
            font-family: 'Poppins', sans-serif;
            transition: var(--transition);
        }

        input:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 4px rgba(85,27,140,0.1);
        }

        .btn-submit {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 50px;
            width: 100%;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-submit:hover {
            background: var(--primary-light);
            transform: translateY(-2px);
        }

        .info-text {
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
        }

        .info-text a {
            color: var(--primary);
            text-decoration: none;
        }

        .info-text a:hover {
            text-decoration: underline;
        }

        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
        }

        .toast {
            background: white;
            border-radius: 12px;
            padding: 12px 20px;
            margin-top: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            border-left: 4px solid;
            animation: slideIn 0.3s ease;
        }

        .toast.success { border-left-color: #28a745; }
        .toast.error { border-left-color: #dc3545; }
        .toast.warning { border-left-color: #ffc107; }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
<div class="glass-card">
    <h1><i class="fas fa-user-plus"></i> Inscription</h1>
    <form id="signupForm">
        <div class="form-group">
            <label>Email *</label>
            <input type="email" id="email" required>
        </div>
        <div class="form-group">
            <label>Mot de passe *</label>
            <input type="password" id="password" required>
        </div>
        <div class="form-group">
            <label>ID HubISoccer *</label>
            <input type="text" id="hubisoccer_id" placeholder="Ex: A7HU82K91BI2026SBJFOOTOM92J8..." required>
        </div>
        <div class="form-group">
            <label>Nom d'affichage (optionnel)</label>
            <input type="text" id="display_name">
        </div>
        <button type="submit" class="btn-submit">S'inscrire</button>
    </form>
    <div class="info-text">
        Vous avez déjà un compte ? <a href="login.html">Connectez-vous</a>
    </div>
</div>
<div id="toastContainer" class="toast-container"></div>

<script>
    // Récupérer le rôle depuis l'URL
    const urlParams = new URLSearchParams(window.location.search);
    const role = urlParams.get('role');
    if (!role) {
        window.location.href = 'role-select.html';
    }

    function showToast(message, type = 'info') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = `<div>${message}</div>`;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    // Vérification de l'ID via l'Edge Function verify-id
    async function verifyId(hubisoccer_id) {
        const response = await fetch('https://nvorqhmpnwtfjlbzzuqp.supabase.co/functions/v1/verify-id', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ hubisoccer_id })
        });
        if (!response.ok) {
            const err = await response.json();
            throw new Error(err.error || 'ID invalide');
        }
        const data = await response.json();
        if (!data.available) throw new Error('ID non disponible');
        return data.role_code;
    }

    // Inscription via l'Edge Function register-user
    async function registerUser(email, password, hubisoccer_id, display_name) {
        const response = await fetch('https://nvorqhmpnwtfjlbzzuqp.supabase.co/functions/v1/register-user', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password, hubisoccer_id, display_name })
        });
        if (!response.ok) {
            const err = await response.json();
            throw new Error(err.error || 'Erreur lors de l\'inscription');
        }
        return await response.json();
    }

    document.getElementById('signupForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const hubisoccer_id = document.getElementById('hubisoccer_id').value.trim().toUpperCase();
        const display_name = document.getElementById('display_name').value.trim();

        if (!email || !password || !hubisoccer_id) {
            showToast('Veuillez remplir tous les champs obligatoires', 'warning');
            return;
        }

        showToast('Vérification en cours...', 'info');
        try {
            // Vérifier l'ID (optionnel mais recommandé)
            const roleFromId = await verifyId(hubisoccer_id);
            if (roleFromId !== role) {
                showToast(`Cet ID est destiné au rôle ${roleFromId}, pas à ${role}`, 'error');
                return;
            }
            // Inscription
            await registerUser(email, password, hubisoccer_id, display_name);
            showToast('Inscription réussie ! Vous pouvez vous connecter.', 'success');
            setTimeout(() => { window.location.href = 'login.html'; }, 2000);
        } catch (err) {
            showToast(err.message, 'error');
        }
    });
</script>
</body>
</html>
