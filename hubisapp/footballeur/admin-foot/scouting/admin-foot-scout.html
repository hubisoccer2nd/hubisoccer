<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Admin Scouting Footballeur | HubISoccer</title>
    <!-- Polices et icônes -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- CSS local -->
    <link rel="stylesheet" href="admin-foot-scout.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- SDK Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- ===== DEBUT LOADER GLOBAL ===== -->
<div id="globalLoader" class="global-loader" style="display:none;">
    <div class="loader-inner"><div class="spinner"></div><p class="loader-text">Chargement…</p></div>
</div>
<!-- ===== FIN LOADER GLOBAL ===== -->

<!-- ===== DEBUT NAVBAR ===== -->
<nav class="admin-nav">
    <div class="nav-left" onclick="window.location.href='../../../index.html'" style="cursor: pointer;">
        <img src="../../../img/logo-navbar.png" alt="HubISoccer" class="logo-nav">
        <span class="admin-title"><i class="fas fa-futbol"></i> Admin Scouting Footballeur</span>
    </div>
    <div class="nav-right">
        <span class="user-name" id="userName">Admin</span>
        <button class="logout-link" id="logoutBtn">Déconnexion</button>
    </div>
</nav>
<!-- ===== FIN NAVBAR ===== -->

<!-- ===== DEBUT CONTENU PRINCIPAL ===== -->
<main class="admin-main">
    <div class="admin-container">
        <div class="admin-header">
            <h1><i class="fas fa-binoculars"></i> Gestion des données de scouting</h1>
            <button class="btn-refresh" id="refreshBtn"><i class="fas fa-sync-alt"></i> Rafraîchir</button>
        </div>

        <!-- Recherche et sélection -->
        <div class="search-panel">
            <input type="text" id="searchInput" placeholder="Rechercher par nom, email ou ID HubISoccer..." />
            <select id="filterClub"><option value="">Tous les clubs</option></select>
        </div>

        <div class="admin-grid">
            <!-- Colonne gauche : liste des footballeurs -->
            <div class="footballeurs-list">
                <h2>Footballeurs</h2>
                <div id="footballeursListContainer" class="list-container"></div>
            </div>

            <!-- Colonne droite : formulaire d'édition -->
            <div class="edit-panel">
                <h2 id="editTitle">Sélectionnez un footballeur</h2>
                <form id="scoutForm" style="display: none;">
                    <input type="hidden" id="footballeurHubisoccerId">

                    <!-- Bandeau identité -->
                    <fieldset>
                        <legend><i class="fas fa-user"></i> Identité</legend>
                        <div class="form-row">
                            <div class="form-group"><label>Nom complet</label><input type="text" id="fullName" readonly></div>
                            <div class="form-group"><label>Club actuel</label><input type="text" id="clubActuel"></div>
                        </div>
                        <div class="form-row">
                            <div class="form-group"><label>Poste principal</label><input type="text" id="poste"></div>
                            <div class="form-group"><label>Poste secondaire</label><input type="text" id="secondaryPositions"></div>
                        </div>
                    </fieldset>

                    <!-- Stats rapides -->
                    <fieldset>
                        <legend><i class="fas fa-chart-simple"></i> Statistiques</legend>
                        <div class="form-row">
                            <div class="form-group"><label>Matchs joués</label><input type="number" id="matchsJoues"></div>
                            <div class="form-group"><label>Buts</label><input type="number" id="buts"></div>
                        </div>
                        <div class="form-row">
                            <div class="form-group"><label>Passes décisives</label><input type="number" id="passesDecisives"></div>
                            <div class="form-group"><label>Valeur marchande (€)</label><input type="number" id="valeurMarche"></div>
                        </div>
                        <div class="form-row">
                            <div class="form-group"><label>Pied gauche (0-100)</label><input type="number" id="leftFootRating" min="0" max="100"></div>
                            <div class="form-group"><label>Pied droit (0-100)</label><input type="number" id="rightFootRating" min="0" max="100"></div>
                        </div>
                    </fieldset>

                    <!-- Contrat -->
                    <fieldset>
                        <legend><i class="fas fa-file-contract"></i> Situation contractuelle</legend>
                        <div class="form-row">
                            <div class="form-group"><label>Expiration contrat</label><input type="date" id="contractExpiry"></div>
                            <div class="form-group"><label>Prochaine évaluation</label><input type="date" id="nextEvaluation"></div>
                        </div>
                    </fieldset>

                    <!-- Radar Corps · Âme · Esprit (aperçu) -->
                    <fieldset>
                        <legend><i class="fas fa-chart-line"></i> Aperçu Radar</legend>
                        <div class="radar-preview">
                            <canvas id="adminRadar" width="300" height="300"></canvas>
                        </div>
                    </fieldset>

                    <!-- Attributs détaillés par onglets -->
                    <fieldset>
                        <legend><i class="fas fa-list-ul"></i> Attributs détaillés</legend>
                        <div class="attr-tabs-btns">
                            <button type="button" class="attr-tab active" data-cat="corps"><i class="fas fa-dumbbell"></i> Corps</button>
                            <button type="button" class="attr-tab" data-cat="ame"><i class="fas fa-brain"></i> Âme</button>
                            <button type="button" class="attr-tab" data-cat="esprit"><i class="fas fa-futbol"></i> Esprit</button>
                        </div>
                        <!-- Corps -->
                        <div id="corps-panel" class="attr-panel active">
                            <div class="attr-grid" id="corpsGrid"></div>
                        </div>
                        <!-- Âme -->
                        <div id="ame-panel" class="attr-panel">
                            <div class="attr-grid" id="ameGrid"></div>
                        </div>
                        <!-- Esprit -->
                        <div id="esprit-panel" class="attr-panel">
                            <div class="attr-grid" id="espritGrid"></div>
                        </div>
                    </fieldset>

                    <!-- Points forts / faibles -->
                    <fieldset>
                        <legend><i class="fas fa-thumbs-up"></i> Analyse qualitative</legend>
                        <div class="form-group"><label>Points forts</label><textarea id="strengths" rows="2"></textarea></div>
                        <div class="form-group"><label>Points faibles</label><textarea id="weaknesses" rows="2"></textarea></div>
                        <div class="form-group"><label>Rapport recruteur</label><textarea id="rapportsRecruteurs" rows="3"></textarea></div>
                    </fieldset>

                    <div class="form-actions">
                        <button type="submit" class="btn-save">Enregistrer les modifications</button>
                    </div>
                </form>
                <div id="noSelectionMessage">Sélectionnez un footballeur pour éditer ses données de scouting.</div>
            </div>
        </div>
    </div>
</main>
<!-- ===== FIN CONTENU PRINCIPAL ===== -->

<!-- ===== TOAST CONTAINER ===== -->
<div id="toastContainer" class="toast-container"></div>

<!-- ===== SCRIPT ===== -->
<script src="admin-foot-scout.js"></script>
</body>
</html>
