<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Notifications | HubISoccer</title>
    <!-- Polices et icônes -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- CSS local -->
    <link rel="stylesheet" href="notifications.css">
    <!-- SDK Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- ===== DEBUT LOADER GLOBAL ===== -->
<div id="globalLoader" class="c-loader" style="display:none;">
    <div class="c-spinner"></div>
    <div class="c-loader-bar-wrap">
        <div class="c-loader-bar" id="loaderBar" style="width:0%"></div>
    </div>
    <span class="c-loader-text" id="loaderText">Chargement des notifications...</span>
</div>
<!-- ===== FIN LOADER GLOBAL ===== -->

<!-- ===== DEBUT NAVBAR ===== -->
<nav class="c-nav">
    <div class="c-nav-left">
        <button class="back-nav-btn" id="backBtn" title="Retour">
            <i class="fas fa-arrow-left"></i>
        </button>
        <img src="../../img/logo-navbar.png" alt="HubISoccer" class="c-nav-logo" id="navLogo">
        <span class="c-nav-title">Notifications</span>
    </div>
    <div class="c-nav-right">
        <div class="c-user-menu" id="userMenu">
            <div class="c-user-avatar-wrap" id="userAvatarWrap">
                <div class="c-user-avatar-initials" id="userAvatarInitials"></div>
                <img class="c-user-avatar" id="userAvatar" alt="" style="display:none;">
            </div>
            <span class="c-user-name" id="userName">...</span>
            <i class="fas fa-chevron-down fa-xs"></i>
            <div class="c-user-dropdown" id="userDropdown">
                <a href="#" id="dropDashboard"><i class="fas fa-tachometer-alt"></i> Tableau de bord</a>
                <a href="feed.html"><i class="fas fa-users"></i> Ma Communauté</a>
                <hr>
                <button id="dropLogout" class="c-logout"><i class="fas fa-sign-out-alt"></i> Déconnexion</button>
            </div>
        </div>
    </div>
</nav>
<!-- ===== FIN NAVBAR ===== -->

<!-- ===== DEBUT CONTENU PRINCIPAL ===== -->
<main class="notifications-main">
    <div class="notifications-container">

        <!-- En-tête avec filtres et actions -->
        <div class="notifications-header">
            <h1><i class="fas fa-bell"></i> Notifications</h1>
            <div class="notifications-actions">
                <button class="btn-ghost" id="markAllReadBtn">
                    <i class="fas fa-check-double"></i> Tout marquer comme lu
                </button>
                <button class="btn-ghost" id="clearAllBtn">
                    <i class="fas fa-trash-alt"></i> Effacer tout
                </button>
            </div>
        </div>

        <!-- Filtres rapides -->
        <div class="notifications-filters">
            <button class="filter-chip active" data-filter="all">Toutes</button>
            <button class="filter-chip" data-filter="unread">Non lues</button>
            <button class="filter-chip" data-filter="like">J'aime</button>
            <button class="filter-chip" data-filter="comment">Commentaires</button>
            <button class="filter-chip" data-filter="follow">Abonnements</button>
            <button class="filter-chip" data-filter="live">Lives</button>
            <button class="filter-chip" data-filter="system">Système</button>
        </div>

        <!-- Liste des notifications -->
        <div class="notifications-list" id="notificationsList">
            <!-- Squelettes de chargement -->
            <div class="notification-skeleton"></div>
            <div class="notification-skeleton"></div>
            <div class="notification-skeleton"></div>
        </div>

        <!-- État vide -->
        <div class="notifications-empty" id="notificationsEmpty" style="display:none;">
            <div class="empty-icon"><i class="fas fa-bell-slash"></i></div>
            <h3>Aucune notification</h3>
            <p>Vous êtes à jour ! Revenez plus tard.</p>
        </div>

        <!-- Bouton charger plus -->
        <div id="loadMoreWrap" style="text-align:center; padding:20px; display:none;">
            <button class="btn-ghost" id="loadMoreBtn">
                <i class="fas fa-arrow-down"></i> Charger plus
            </button>
        </div>

    </div>
</main>
<!-- ===== FIN CONTENU PRINCIPAL ===== -->

<!-- ===== DEBUT TOAST CONTAINER ===== -->
<div id="toastContainer" class="c-toast-container"></div>
<!-- ===== FIN TOAST CONTAINER ===== -->

<!-- ===== DEBUT SCRIPTS ===== -->
<script src="utils.js"></script>
<script src="session.js"></script>
<script src="notifications.js"></script>
<!-- ===== FIN SCRIPTS ===== -->
</body>
</html>
