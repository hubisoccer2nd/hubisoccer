<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Visionneuse | HubISoccer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="stories-view.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="viewer-body">

<!-- ===== LOADER ===== -->
<div class="c-loader" id="globalLoader" style="display:flex;">
    <div class="c-spinner"></div>
    <span class="c-loader-text">Chargement de la story...</span>
</div>

<!-- ===== VISIONNEUSE ===== -->
<div id="storyViewerPage" class="story-viewer-page">

    <!-- Barres de progression -->
    <div class="sv-progress-bar-container" id="svProgressBars"></div>

    <!-- En-tête -->
    <div class="sv-header">
        <div class="sv-author" id="svAuthor">
            <div class="sv-author-avatar-initials" id="svAuthorAvatarInitials"></div>
            <img id="svAuthorAvatar" alt="" class="sv-author-avatar" style="display:none;">
            <div class="sv-author-info">
                <span class="sv-author-name" id="svAuthorName">...</span>
                <span class="sv-author-time" id="svAuthorTime">...</span>
                <span class="sv-author-handle" id="svAuthorHandle"></span>
            </div>
        </div>
        <div class="sv-header-actions">
            <button class="sv-option-btn" id="svOptionsBtn" style="display:none" title="Options">
                <i class="fas fa-ellipsis-v"></i>
            </button>
            <button class="sv-close-btn" id="svCloseBtn" title="Fermer">
                <i class="fas fa-times"></i>
            </button>
        </div>
    </div>

    <!-- Zone média -->
    <div class="sv-media-area" id="svMediaArea">
        <div class="sv-media-loader" id="svMediaLoader">
            <div class="c-spinner" style="border-color:rgba(255,255,255,0.3);border-top-color:white"></div>
        </div>
    </div>

    <!-- Légende -->
    <div class="sv-caption" id="svCaption" style="display:none"></div>

    <!-- Flèches de navigation -->
    <button class="sv-nav-arrow sv-nav-prev" id="svNavPrev" title="Précédent"><i class="fas fa-chevron-left"></i></button>
    <button class="sv-nav-arrow sv-nav-next" id="svNavNext" title="Suivant"><i class="fas fa-chevron-right"></i></button>

    <!-- Zones tactiles -->
    <div class="sv-tap-prev" id="svTapPrev"></div>
    <div class="sv-tap-next" id="svTapNext"></div>

    <!-- Mute -->
    <button class="sv-mute-btn" id="svMuteBtn" style="display:none" title="Son">
        <i class="fas fa-volume-up" id="svMuteIcon"></i>
    </button>

    <!-- Footer -->
    <div class="sv-footer" id="svFooter">
        <div class="sv-reply-row" id="svReplyRow">
            <div class="sv-reply-input-wrap" id="svReplyInputWrap">
                <div class="sv-reply-avatar-initials" id="svReplyAvatarInitials"></div>
                <img id="svReplyAvatar" alt="" class="sv-reply-avatar" style="display:none;">
                <input type="text" id="svReplyInput" placeholder="Répondre à la story..." maxlength="300">
                <button class="sv-reply-send-btn" id="svReplySendBtn" title="Envoyer">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>

            <div class="sv-quick-actions">
                <button class="sv-quick-btn" id="svSendPhotoBtn" title="Répondre par photo">
                    <i class="fas fa-camera"></i>
                </button>
                <button class="sv-quick-btn" id="svSendAudioBtn" title="Répondre par audio">
                    <i class="fas fa-microphone"></i>
                </button>
                <button class="sv-quick-btn" id="svSendVideoBtn" title="Répondre par vidéo">
                    <i class="fas fa-video"></i>
                </button>
                <button class="sv-quick-btn gold" id="svSendCoinsBtn" title="Envoyer des HubiCoins">
                    <i class="fas fa-coins"></i>
                </button>
                <button class="sv-quick-btn" id="svPausePlayBtn" title="Pause/Reprise">
                    <i class="fas fa-pause" id="svPausePlayIcon"></i>
                </button>
                <button class="sv-quick-btn" id="svLikeStoryBtn" title="Réagir">
                    <i class="far fa-heart" id="svLikeIcon"></i>
                </button>
            </div>
        </div>

        <!-- Enregistreur audio -->
        <div class="sv-audio-recorder" id="svAudioRecorder" style="display:none">
            <div class="sv-rec-left">
                <span class="sv-rec-dot"></span>
                <span class="sv-rec-time" id="svRecTime">0:00</span>
            </div>
            <div class="sv-rec-waves">
                <span></span><span></span><span></span><span></span><span></span>
            </div>
            <div class="sv-rec-btns">
                <button class="sv-rec-cancel" id="svRecCancel"><i class="fas fa-trash-alt"></i></button>
                <button class="sv-rec-stop" id="svRecStop"><i class="fas fa-stop"></i> Envoyer</button>
            </div>
        </div>
    </div>

    <!-- Panneau des vues -->
    <div class="sv-viewers-panel" id="svViewersPanel" style="display:none">
        <div class="sv-viewers-header">
            <span><i class="fas fa-eye"></i> Vues <strong id="svViewersCount">0</strong></span>
            <button id="closeViewersPanelBtn"><i class="fas fa-times"></i></button>
        </div>
        <div class="sv-viewers-list" id="svViewersList"></div>
    </div>

</div>

<!-- ===== MODALES ===== -->

<!-- Options story -->
<div id="modalStoryOptions" class="c-modal">
    <div class="c-modal-box c-modal-box-sm">
        <div class="c-modal-head">
            <h2 id="optionsModalTitle">Options</h2>
            <button class="c-modal-close" onclick="closeModal('modalStoryOptions')"><i class="fas fa-times"></i></button>
        </div>
        <div class="c-modal-body" style="padding:8px 0" id="optionsModalBody"></div>
    </div>
</div>

<!-- Envoyer HubiCoins -->
<div id="modalSendCoins" class="c-modal">
    <div class="c-modal-box c-modal-box-sm">
        <div class="c-modal-head">
            <h2><i class="fas fa-coins" style="color:var(--gold)"></i> Envoyer des HubiCoins</h2>
            <button class="c-modal-close" onclick="closeModal('modalSendCoins')"><i class="fas fa-times"></i></button>
        </div>
        <div class="c-modal-body">
            <p style="font-size:0.82rem;color:var(--gray);margin-bottom:14px">
                Ton solde : <strong id="coinsBalance" style="color:var(--gold)">0 🪙</strong>
            </p>
            <div class="coins-presets">
                <button class="coins-preset" data-amount="10">10 🪙</button>
                <button class="coins-preset" data-amount="50">50 🪙</button>
                <button class="coins-preset" data-amount="100">100 🪙</button>
                <button class="coins-preset" data-amount="200">200 🪙</button>
                <button class="coins-preset" data-amount="500">500 🪙</button>
            </div>
            <div class="c-field" style="margin-top:14px">
                <label>Montant personnalisé</label>
                <input type="number" class="c-input" id="coinsCustomAmount" min="1" max="9999" placeholder="Ex : 75">
            </div>
            <div class="c-field">
                <label>Message <span class="hint">(optionnel)</span></label>
                <input type="text" class="c-input" id="coinsMessage" maxlength="80" placeholder="Bravo ! Continue comme ça ⚽">
            </div>
        </div>
        <div class="c-modal-foot">
            <button class="btn-ghost" onclick="closeModal('modalSendCoins')">Annuler</button>
            <button class="btn-gold" id="confirmSendCoinsBtn">
                <i class="fas fa-paper-plane"></i> Envoyer
            </button>
        </div>
    </div>
</div>

<!-- Réaction rapide -->
<div id="modalStoryReact" class="c-modal">
    <div class="c-modal-box c-modal-box-sm">
        <div class="c-modal-head">
            <h2>Réagir à la story</h2>
            <button class="c-modal-close" onclick="closeModal('modalStoryReact')"><i class="fas fa-times"></i></button>
        </div>
        <div class="c-modal-body">
            <div class="story-react-grid">
                <span data-emoji="❤️">❤️</span> <span data-emoji="🔥">🔥</span> <span data-emoji="😂">😂</span>
                <span data-emoji="😮">😮</span> <span data-emoji="👏">👏</span> <span data-emoji="⚽">⚽</span>
                <span data-emoji="💪">💪</span> <span data-emoji="🏆">🏆</span> <span data-emoji="😢">😢</span>
                <span data-emoji="🥳">🥳</span> <span data-emoji="👍">👍</span> <span data-emoji="🌟">🌟</span>
            </div>
        </div>
    </div>
</div>

<!-- Répondre par média -->
<div id="modalMediaReply" class="c-modal">
    <div class="c-modal-box">
        <div class="c-modal-head">
            <h2 id="mediaReplyTitle">Répondre par photo</h2>
            <button class="c-modal-close" onclick="closeModal('modalMediaReply')"><i class="fas fa-times"></i></button>
        </div>
        <div class="c-modal-body">
            <div class="media-reply-preview" id="mediaReplyPreview">
                <div class="media-reply-drop" id="mediaReplyDrop">
                    <i class="fas fa-camera" id="mediaReplyIcon" style="font-size:2rem;color:var(--gray)"></i>
                    <p id="mediaReplyHint">Clique pour choisir une photo</p>
                    <input type="file" id="mediaReplyInput" accept="image/*,video/*" style="display:none">
                </div>
            </div>
            <div class="c-field" style="margin-top:12px">
                <label>Légende <span class="hint">(optionnel)</span></label>
                <input type="text" class="c-input" id="mediaReplyCaption" maxlength="100" placeholder="Ajouter un message...">
            </div>
        </div>
        <div class="c-modal-foot">
            <button class="btn-ghost" onclick="closeModal('modalMediaReply')">Annuler</button>
            <button class="btn-primary" id="sendMediaReplyBtn">
                <i class="fas fa-paper-plane"></i> Envoyer
            </button>
        </div>
    </div>
</div>

<!-- Confirmation -->
<div id="modalConfirm" class="c-modal">
    <div class="c-modal-box c-modal-box-sm">
        <div class="c-modal-head">
            <h2 id="confirmTitle">Confirmation</h2>
            <button class="c-modal-close" onclick="closeModal('modalConfirm')"><i class="fas fa-times"></i></button>
        </div>
        <div class="c-modal-body"><p id="confirmDesc"></p></div>
        <div class="c-modal-foot">
            <button class="btn-ghost" onclick="closeModal('modalConfirm')">Annuler</button>
            <button class="btn-danger" id="confirmActionBtn">Confirmer</button>
        </div>
    </div>
</div>

<!-- ===== TOASTS ===== -->
<div id="toastContainer" class="c-toast-container"></div>

<!-- ===== SCRIPTS ===== -->
<script src="utils.js"></script>
<script src="session.js"></script>
<script src="stories-view.js"></script>
</body>
</html>
