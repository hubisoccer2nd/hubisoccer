<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>En construction | HubISoccer</title>
    <!-- Polices & Icônes -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --primary: #551B8C;
            --gold: #FFCC00;
            --bg: #f4f1f9;
            --text: #1a1a2e;
            --gray: #6c757d;
            --radius: 14px;
            --shadow: 0 12px 40px rgba(85,27,140,0.12);
            --font: 'Poppins', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font);
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: var(--radius);
            padding: 48px 32px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: var(--shadow);
            border-left: 6px solid var(--gold);
        }
        .card i {
            font-size: 3rem;
            color: var(--gold);
            margin-bottom: 20px;
        }
        .card h1 {
            font-size: 1.8rem;
            color: var(--primary);
            margin-bottom: 12px;
        }
        .card p {
            color: var(--gray);
            margin-bottom: 24px;
        }
        .btn {
            display: inline-block;
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.95rem;
            text-decoration: none;
            cursor: pointer;
            transition: 0.25s ease;
        }
        .btn:hover {
            background: #7e3db0;
        }
    </style>
</head>
<body>
    <div class="card">
        <i class="fas fa-hard-hat"></i>
        <h1>Section en construction</h1>
        <p>Cette page n’est pas encore disponible. Revenez bientôt.</p>
        <a href="../../authprive/users/login.html" class="btn"><i class="fas fa-arrow-left"></i> Retour à l’accueil</a>
    </div>
</body>
</html>
