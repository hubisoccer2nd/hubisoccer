<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Admin Affiliation | HubISoccer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="affiliation-admin.css">
</head>
<body>
    <nav class="dashboard-nav">
        <div class="nav-left">
            <img src="../../../public/img/logo-navbar.png" alt="HubISoccer" class="logo-nav" onclick="window.location.href='../administration.html'">
            <span class="dashboard-title">Admin / Affiliation</span>
        </div>
        <div class="nav-right">
            <button id="logoutBtn" class="logout-btn">Déconnexion</button>
        </div>
    </nav>

    <div class="admin-container">
        <div class="admin-header">
            <h1><i class="fas fa-hand-holding-usd"></i> Gestion des affiliés</h1>
            <p>Gérez les demandes, validez les comptes, envoyez des messages.</p>
        </div>

        <div class="stats-row" id="statsRow">
            <!-- Statistiques dynamiques -->
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="affiliates">Affiliés</button>
            <button class="tab-btn" data-tab="payments">Demandes de paiement</button>
            <button class="tab-btn" data-tab="messages">Messages</button>
        </div>

        <!-- Onglet Affiliés -->
        <div id="affiliates" class="tab-content active">
            <div class="search-bar">
                <input type="text" id="searchAffiliate" placeholder="Rechercher par ID, nom, téléphone...">
                <select id="statusFilter">
                    <option value="all">Tous</option>
                    <option value="valide">Validés</option>
                    <option value="non_valide">Non validés</option>
                </select>
                <button id="refreshAffiliates" class="refresh-btn"><i class="fas fa-sync-alt"></i> Rafraîchir</button>
            </div>
            <div id="affiliatesList" class="admin-list"></div>
        </div>

        <!-- Onglet Demandes de paiement -->
        <div id="payments" class="tab-content">
            <div class="search-bar">
                <select id="paymentStatusFilter">
                    <option value="all">Tous</option>
                    <option value="en_attente">En attente</option>
                    <option value="approuvé">Approuvé</option>
                    <option value="refusé">Refusé</option>
                </select>
                <button id="refreshPayments" class="refresh-btn"><i class="fas fa-sync-alt"></i> Rafraîchir</button>
            </div>
            <div id="paymentsList" class="admin-list"></div>
        </div>

        <!-- Onglet Messages -->
        <div id="messages" class="tab-content">
            <div class="send-message-section">
                <h3>Envoyer un message à un affilié</h3>
                <select id="targetAffiliate" required>
                    <option value="">Sélectionner un affilié</option>
                </select>
                <textarea id="adminMessage" rows="3" placeholder="Votre message..."></textarea>
                <button id="sendMessageBtn" class="btn-submit">Envoyer le message</button>
            </div>
            <div id="messagesList" class="admin-list">
                <!-- Liste des messages récents -->
            </div>
        </div>
    </div>

    <footer class="dashboard-footer">
        <div class="footer-content">
            <div class="legal">
                <p>© 2026 HubISoccer - Tous droits réservés.</p>
            </div>
        </div>
    </footer>

    <script src="affiliation-admin.js"></script>
</body>
</html>
