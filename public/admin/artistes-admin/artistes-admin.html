<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Admin Artistes | HubISoccer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="artistes-admin.css">
</head>
<body>
    <nav class="dashboard-nav">
        <div class="nav-left">
            <img src="../../../public/img/logo-navbar.png" alt="HubISoccer" class="logo-nav" onclick="window.location.href='../../administration.html'">
            <span class="dashboard-title">Admin / Artistes</span>
        </div>
        <div class="nav-right">
            <button id="logoutBtn" class="logout-btn">Déconnexion</button>
        </div>
    </nav>

    <div class="admin-container">
        <div class="admin-header">
            <h1><i class="fas fa-palette"></i> Gestion des artistes</h1>
            <p>Gérez les adhésions, les examens, les tests pratiques et la messagerie.</p>
        </div>

        <div class="stats-row" id="statsRow"></div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="artistes">Artistes</button>
            <button class="tab-btn" data-tab="examens">Examens</button>
            <button class="tab-btn" data-tab="analyses">Tests pratiques</button>
            <button class="tab-btn" data-tab="messages">Messages</button>
        </div>

        <!-- Artistes -->
        <div id="artistes" class="tab-content active">
            <div class="search-bar">
                <input type="text" id="searchArtiste" placeholder="Rechercher par ID, nom, téléphone...">
                <select id="statusFilter">
                    <option value="all">Tous</option>
                    <option value="en_attente">En attente</option>
                    <option value="valide_public">Validé</option>
                    <option value="rejete">Rejeté</option>
                </select>
                <button id="refreshArtistes" class="refresh-btn"><i class="fas fa-sync-alt"></i> Rafraîchir</button>
            </div>
            <div id="artistesList" class="admin-list"></div>
        </div>

        <!-- Examens -->
        <div id="examens" class="tab-content">
            <div class="search-bar">
                <input type="text" id="searchExamen" placeholder="Rechercher par ID artiste...">
                <select id="examenStatusFilter">
                    <option value="all">Tous</option>
                    <option value="en_attente">En attente</option>
                    <option value="corrige">Corrigé</option>
                </select>
                <button id="refreshExamens" class="refresh-btn"><i class="fas fa-sync-alt"></i> Rafraîchir</button>
            </div>
            <div id="examensList" class="admin-list"></div>
        </div>

        <!-- Tests pratiques -->
        <div id="analyses" class="tab-content">
            <div class="search-bar">
                <input type="text" id="searchAnalyse" placeholder="Rechercher par ID artiste...">
                <select id="analyseStatusFilter">
                    <option value="all">Tous</option>
                    <option value="en_attente">En attente</option>
                    <option value="valide">Validé</option>
                    <option value="rejete">Rejeté</option>
                </select>
                <button id="refreshAnalyses" class="refresh-btn"><i class="fas fa-sync-alt"></i> Rafraîchir</button>
            </div>
            <div id="analysesList" class="admin-list"></div>
        </div>

        <!-- Messages -->
        <div id="messages" class="tab-content">
            <div class="send-message-section">
                <h3>Envoyer un message à un artiste</h3>
                <select id="targetArtiste" required>
                    <option value="">Sélectionner un artiste</option>
                </select>
                <textarea id="adminMessage" rows="3" placeholder="Votre message..."></textarea>
                <button id="sendMessageBtn" class="btn-submit">Envoyer le message</button>
            </div>
            <div id="messagesList" class="admin-list"></div>
        </div>
    </div>

    <footer class="dashboard-footer">
        <div class="footer-content">
            <div class="legal">
                <p>© 2026 HubISoccer - Tous droits réservés.</p>
            </div>
        </div>
    </footer>

    <div id="toastContainer" class="toast-container"></div>

    <!-- Modale examen -->
    <div id="examenModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h3>Corriger l'examen</h3>
            <input type="hidden" id="examenId">
            <div class="form-group">
                <label>Note /20</label>
                <input type="number" id="examenNote" step="0.01" min="0" max="20">
            </div>
            <div class="form-group">
                <label>Commentaire</label>
                <textarea id="examenCommentaire" rows="3"></textarea>
            </div>
            <button id="saveExamenBtn" class="btn-submit">Enregistrer la correction</button>
        </div>
    </div>

    <!-- Modale test pratique -->
    <div id="analyseModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h3>Évaluer le test pratique</h3>
            <input type="hidden" id="analyseId">
            <div class="form-group">
                <label>Statut</label>
                <select id="analyseStatut">
                    <option value="valide">Validé</option>
                    <option value="rejete">Rejeté</option>
                </select>
            </div>
            <div class="form-group">
                <label>Commentaire</label>
                <textarea id="analyseCommentaire" rows="3"></textarea>
            </div>
            <button id="saveAnalyseBtn" class="btn-submit">Enregistrer</button>
        </div>
    </div>

    <script src="artistes-admin.js"></script>
</body>
</html>
