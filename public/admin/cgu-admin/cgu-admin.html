<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Admin CGU | HubISoccer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="cgu-admin.css">
</head>
<body>
    <nav class="dashboard-nav">
        <div class="nav-left">
            <img src="../../../public/img/logo-navbar.png" alt="HubISoccer" class="logo-nav" onclick="window.location.href='../administration.html'">
            <span class="dashboard-title">Admin / CGU</span>
        </div>
        <div class="nav-right">
            <button id="logoutBtn" class="logout-btn">Déconnexion</button>
        </div>
    </nav>

    <div class="admin-container">
        <div class="admin-header">
            <h1><i class="fas fa-file-contract"></i> Gestion des Conditions Générales d'Utilisation</h1>
            <p>Modifiez le contenu de la page CGU (HTML accepté).</p>
        </div>

        <div class="form-section">
            <h3>Contenu de la page CGU</h3>
            <form id="cguForm">
                <div class="form-group">
                    <label>Texte (HTML autorisé)</label>
                    <textarea id="contenu" rows="15" required></textarea>
                    <small>Vous pouvez utiliser des balises HTML (h1, h2, p, ul, etc.) pour structurer le contenu.</small>
                </div>
                <button type="submit" class="btn-submit">Enregistrer</button>
            </form>
        </div>

        <div class="preview-section">
            <h3>Aperçu</h3>
            <div id="preview" class="preview-content"></div>
        </div>
    </div>

    <footer class="dashboard-footer">
        <div class="legal"><p>© 2026 HubISoccer - Tous droits réservés.</p></div>
    </footer>

    <script src="cgu-admin.js"></script>
</body>
</html>
