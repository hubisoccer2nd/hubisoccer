<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Admin Contact | HubISoccer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="contact-admin.css">
</head>
<body>
    <nav class="dashboard-nav">
        <div class="nav-left">
            <img src="../../../public/img/logo-navbar.png" alt="HubISoccer" class="logo-nav" onclick="window.location.href='../administration.html'">
            <span class="dashboard-title">Admin / Messages de contact</span>
        </div>
        <div class="nav-right">
            <button id="logoutBtn" class="logout-btn">Déconnexion</button>
        </div>
    </nav>

    <div class="admin-container">
        <div class="admin-header">
            <h1><i class="fas fa-envelope"></i> Messages reçus</h1>
            <p>Consultez et gérez les messages envoyés via le formulaire de contact.</p>
        </div>

        <div class="filters">
            <button id="showAll" class="filter-btn active">Tous</button>
            <button id="showUnread" class="filter-btn">Non lus</button>
            <button id="refreshBtn" class="refresh-btn"><i class="fas fa-sync-alt"></i> Rafraîchir</button>
        </div>

        <div id="messagesList" class="messages-list">
            <div class="loader">Chargement...</div>
        </div>
    </div>

    <footer class="dashboard-footer">
        <div class="legal"><p>© 2026 HubISoccer - Tous droits réservés.</p></div>
    </footer>

    <script src="contact-admin.js"></script>
</body>
</html>
