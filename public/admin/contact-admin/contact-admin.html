<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Gestion des messages de contact | HubISoccer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="contact-admin.css">
</head>
<body>
    <!-- ========== DÉBUT : LOADER ========== -->
    <div id="globalLoader" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 9999; justify-content: center; align-items: center; color: white; font-size: 1.2rem;">
        <div class="spinner"></div> Chargement...
    </div>
    <!-- ========== FIN : LOADER ========== -->

    <!-- ========== DÉBUT : NAVIGATION ========== -->
    <nav>
        <a href="../../../index.html" class="logo-link">
            <img src="../img/logo-navbar.png" alt="HubISoccer" class="logo-nav">
        </a>
        <div class="nav-right">
            <span class="admin-badge"><i class="fas fa-envelope"></i> Administration Contacts</span>
            <button class="menu-toggle" id="menuToggle"><span></span><span></span><span></span></button>
            <div class="nav-links" id="navLinks">
                <a href="../administration/"><i class="fas fa-th-large"></i> Portail</a>
                <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Déconnexion</a>
            </div>
        </div>
    </nav>
    <!-- ========== FIN : NAVIGATION ========== -->

    <!-- ========== DÉBUT : CONTENU PRINCIPAL ========== -->
    <main class="admin-main">
        <div class="admin-container">
            <div class="page-header">
                <h1><i class="fas fa-envelope"></i> Gestion des messages de contact</h1>
                <p>Consultez et gérez les messages envoyés par les visiteurs.</p>
            </div>

            <div class="table-container">
                <table id="messagesTable">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Nom</th>
                            <th>Email</th>
                            <th>Sujet</th>
                            <th>Message</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="messagesBody">
                        <tr><td colspan="6" class="loading-placeholder">Chargement...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
    <!-- ========== FIN : CONTENU PRINCIPAL ========== -->

    <div id="toastContainer" class="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="contact-admin.js"></script>
</body>
</html>
<!-- FIN : public/admin/contact-admin/contact-admin.html -->
