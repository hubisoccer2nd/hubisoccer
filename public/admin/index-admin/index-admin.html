<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Admin page d'accueil | HubISoccer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #551B8C;
            --primary-dark: #3d1266;
            --gold: #FFCC00;
            --danger: #dc3545;
            --gray: #6c757d;
            --light-gray: #e9ecef;
            --success: #28a745;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        header {
            background: var(--primary);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        header h1 {
            font-size: 1.5rem;
            font-weight: 600;
        }
        .logout-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            transition: background 0.2s;
        }
        .logout-btn:hover {
            background: rgba(255,255,255,0.3);
        }
        .tabs {
            display: flex;
            background: var(--light-gray);
            border-bottom: 1px solid #ddd;
        }
        .tab-btn {
            flex: 1;
            padding: 15px;
            background: none;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 1rem;
        }
        .tab-btn.active {
            background: white;
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
        }
        .tab-content {
            padding: 30px;
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .form-section {
            background: var(--light-gray);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
        }
        .form-section h3 {
            margin-bottom: 15px;
            color: var(--primary);
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-weight: 500;
            margin-bottom: 5px;
            color: var(--primary-dark);
        }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: inherit;
        }
        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: var(--primary-dark);
        }
        .btn-delete {
            background: var(--danger);
        }
        .btn-delete:hover {
            background: #c82333;
        }
        .items-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .item-card {
            background: white;
            border: 1px solid var(--light-gray);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .item-info {
            flex: 1;
        }
        .item-info h4 {
            margin-bottom: 5px;
            color: var(--primary);
        }
        .item-info p {
            color: var(--gray);
            font-size: 0.9rem;
        }
        .item-actions {
            display: flex;
            gap: 10px;
        }
        .edit-btn, .delete-btn {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            border: none;
        }
        .edit-btn {
            background: var(--gold);
            color: #000;
        }
        .delete-btn {
            background: var(--danger);
            color: white;
        }
        .image-preview {
            max-width: 100px;
            max-height: 100px;
            border-radius: 8px;
            margin-top: 10px;
        }
        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 5px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .message {
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <header>
        <h1>Administration - Page d'accueil</h1>
        <button id="logoutBtn" class="logout-btn">Déconnexion</button>
    </header>
    <div class="tabs">
        <button class="tab-btn active" data-tab="engagements">Engagements</button>
        <button class="tab-btn" data-tab="roles">Rôles</button>
        <button class="tab-btn" data-tab="stades">Stades</button>
    </div>
    <div id="engagements" class="tab-content active">
        <div class="form-section">
            <h3>Ajouter un engagement</h3>
            <form id="addEngagementForm">
                <div class="form-group"><label>Titre</label><input type="text" id="engTitle" required></div>
                <div class="form-group"><label>Description</label><textarea id="engDesc" rows="3"></textarea></div>
                <div class="form-group"><label>Icône (nom FontAwesome, ex: fa-gavel)</label><input type="text" id="engIcon" placeholder="fa-gavel"></div>
                <div class="form-group"><label>Ordre</label><input type="number" id="engOrder" value="0"></div>
                <button type="submit">Ajouter</button>
            </form>
        </div>
        <div id="engagementsList" class="items-list"></div>
    </div>
    <div id="roles" class="tab-content">
        <div class="form-section">
            <h3>Ajouter un rôle</h3>
            <form id="addRoleForm">
                <div class="form-group"><label>Titre</label><input type="text" id="roleTitle" required></div>
                <div class="form-group"><label>Description</label><textarea id="roleDesc" rows="3"></textarea></div>
                <div class="form-group"><label>Icône (nom FontAwesome, ex: fa-user)</label><input type="text" id="roleIcon" placeholder="fa-user"></div>
                <div class="form-group"><label>Ordre</label><input type="number" id="roleOrder" value="0"></div>
                <button type="submit">Ajouter</button>
            </form>
        </div>
        <div id="rolesList" class="items-list"></div>
    </div>
    <div id="stades" class="tab-content">
        <div class="form-section">
            <h3>Ajouter un stade</h3>
            <form id="addStadeForm">
                <div class="form-group"><label>Nom</label><input type="text" id="stadeName" required></div>
                <div class="form-group"><label>Description</label><textarea id="stadeDesc" rows="3"></textarea></div>
                <div class="form-group"><label>Image</label><input type="file" id="stadeImage" accept="image/*"></div>
                <div class="form-group"><label>Ordre</label><input type="number" id="stadeOrder" value="0"></div>
                <button type="submit">Ajouter</button>
            </form>
        </div>
        <div id="stadesList" class="items-list"></div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://qdqkmsetcmtkdvilpwax.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcWttc2V0Y210a2R2aWxwd2F4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNzAyMTMsImV4cCI6MjA4OTg0NjIxM30.S_9XeKGsFVu6tP129HvswIJTwkDmbwZUkjL01l8MDvk';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = null;

    // Vérifier la session et rediriger si non connecté
    async function checkAuth() {
        const { data: { session } } = await supabase.auth.getSession();
        if (!session) {
            window.location.href = '../administration.html';
            return false;
        }
        currentUser = session.user;
        return true;
    }

    // Gestion des onglets
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(btn.dataset.tab).classList.add('active');
        });
    });

    // Fonction utilitaire pour afficher les messages
    function showMessage(text, type) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${type}`;
        msgDiv.textContent = text;
        document.querySelector('.container').prepend(msgDiv);
        msgDiv.style.display = 'block';
        setTimeout(() => msgDiv.remove(), 3000);
    }

    // Charger les engagements
    async function loadEngagements() {
        const { data, error } = await supabase.from('public_data.engagements').select('*').order('order', { ascending: true });
        if (error) {
            showMessage('Erreur chargement engagements', 'error');
            return;
        }
        const container = document.getElementById('engagementsList');
        if (!data.length) {
            container.innerHTML = '<p>Aucun engagement</p>';
            return;
        }
        container.innerHTML = data.map(item => `
            <div class="item-card" data-id="${item.id}">
                <div class="item-info">
                    <h4>${item.title}</h4>
                    <p>${item.description || ''}</p>
                    <small>Icône: ${item.icon || 'fa-handshake'}</small>
                </div>
                <div class="item-actions">
                    <button class="edit-btn" onclick="editEngagement(${item.id})">Modifier</button>
                    <button class="delete-btn" onclick="deleteEngagement(${item.id})">Supprimer</button>
                </div>
            </div>
        `).join('');
    }

    // Ajouter un engagement
    document.getElementById('addEngagementForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const title = document.getElementById('engTitle').value;
        const description = document.getElementById('engDesc').value;
        const icon = document.getElementById('engIcon').value;
        const order = parseInt(document.getElementById('engOrder').value) || 0;
        const { error } = await supabase.from('public_data.engagements').insert({ title, description, icon, order });
        if (error) {
            showMessage('Erreur ajout: ' + error.message, 'error');
        } else {
            showMessage('Engagement ajouté', 'success');
            document.getElementById('addEngagementForm').reset();
            loadEngagements();
        }
    });

    // Modifier un engagement (exemple simple : prompt)
    window.editEngagement = async (id) => {
        const { data } = await supabase.from('public_data.engagements').select('*').eq('id', id).single();
        if (!data) return;
        const newTitle = prompt('Nouveau titre', data.title);
        if (newTitle === null) return;
        const newDesc = prompt('Nouvelle description', data.description);
        const newIcon = prompt('Icône', data.icon);
        const newOrder = prompt('Ordre', data.order);
        const { error } = await supabase.from('public_data.engagements').update({
            title: newTitle,
            description: newDesc,
            icon: newIcon,
            order: parseInt(newOrder) || 0
        }).eq('id', id);
        if (error) showMessage('Erreur modification', 'error');
        else {
            showMessage('Modifié', 'success');
            loadEngagements();
        }
    };

    window.deleteEngagement = async (id) => {
        if (!confirm('Supprimer définitivement ?')) return;
        const { error } = await supabase.from('public_data.engagements').delete().eq('id', id);
        if (error) showMessage('Erreur suppression', 'error');
        else {
            showMessage('Supprimé', 'success');
            loadEngagements();
        }
    };

    // Charger les rôles
    async function loadRoles() {
        const { data, error } = await supabase.from('public_data.roles').select('*').order('order', { ascending: true });
        if (error) {
            showMessage('Erreur chargement rôles', 'error');
            return;
        }
        const container = document.getElementById('rolesList');
        if (!data.length) {
            container.innerHTML = '<p>Aucun rôle</p>';
            return;
        }
        container.innerHTML = data.map(item => `
            <div class="item-card" data-id="${item.id}">
                <div class="item-info">
                    <h4>${item.title}</h4>
                    <p>${item.description || ''}</p>
                    <small>Icône: ${item.icon || 'fa-user'}</small>
                </div>
                <div class="item-actions">
                    <button class="edit-btn" onclick="editRole(${item.id})">Modifier</button>
                    <button class="delete-btn" onclick="deleteRole(${item.id})">Supprimer</button>
                </div>
            </div>
        `).join('');
    }

    document.getElementById('addRoleForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const title = document.getElementById('roleTitle').value;
        const description = document.getElementById('roleDesc').value;
        const icon = document.getElementById('roleIcon').value;
        const order = parseInt(document.getElementById('roleOrder').value) || 0;
        const { error } = await supabase.from('public_data.roles').insert({ title, description, icon, order });
        if (error) showMessage('Erreur ajout: ' + error.message, 'error');
        else {
            showMessage('Rôle ajouté', 'success');
            document.getElementById('addRoleForm').reset();
            loadRoles();
        }
    });

    window.editRole = async (id) => {
        const { data } = await supabase.from('public_data.roles').select('*').eq('id', id).single();
        if (!data) return;
        const newTitle = prompt('Nouveau titre', data.title);
        if (newTitle === null) return;
        const newDesc = prompt('Nouvelle description', data.description);
        const newIcon = prompt('Icône', data.icon);
        const newOrder = prompt('Ordre', data.order);
        const { error } = await supabase.from('public_data.roles').update({
            title: newTitle,
            description: newDesc,
            icon: newIcon,
            order: parseInt(newOrder) || 0
        }).eq('id', id);
        if (error) showMessage('Erreur modification', 'error');
        else {
            showMessage('Modifié', 'success');
            loadRoles();
        }
    };

    window.deleteRole = async (id) => {
        if (!confirm('Supprimer définitivement ?')) return;
        const { error } = await supabase.from('public_data.roles').delete().eq('id', id);
        if (error) showMessage('Erreur suppression', 'error');
        else {
            showMessage('Supprimé', 'success');
            loadRoles();
        }
    };

    // Charger les stades
    async function loadStades() {
        const { data, error } = await supabase.from('public_data.stades').select('*').order('order', { ascending: true });
        if (error) {
            showMessage('Erreur chargement stades', 'error');
            return;
        }
        const container = document.getElementById('stadesList');
        if (!data.length) {
            container.innerHTML = '<p>Aucun stade</p>';
            return;
        }
        container.innerHTML = data.map(item => `
            <div class="item-card" data-id="${item.id}">
                <div class="item-info">
                    <h4>${item.name}</h4>
                    <p>${item.description || ''}</p>
                    <img class="image-preview" src="${item.image_url}" alt="${item.name}">
                </div>
                <div class="item-actions">
                    <button class="edit-btn" onclick="editStade(${item.id})">Modifier</button>
                    <button class="delete-btn" onclick="deleteStade(${item.id})">Supprimer</button>
                </div>
            </div>
        `).join('');
    }

    // Upload d'image pour les stades
    async function uploadStadeImage(file) {
        const fileExt = file.name.split('.').pop();
        const fileName = `${Date.now()}.${fileExt}`;
        const { error } = await supabase.storage.from('public_images').upload(fileName, file);
        if (error) throw error;
        const { data: urlData } = supabase.storage.from('public_images').getPublicUrl(fileName);
        return urlData.publicUrl;
    }

    document.getElementById('addStadeForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('stadeName').value;
        const description = document.getElementById('stadeDesc').value;
        const order = parseInt(document.getElementById('stadeOrder').value) || 0;
        const fileInput = document.getElementById('stadeImage');
        let imageUrl = '';
        if (fileInput.files.length) {
            try {
                imageUrl = await uploadStadeImage(fileInput.files[0]);
            } catch (err) {
                showMessage('Erreur upload image', 'error');
                return;
            }
        }
        const { error } = await supabase.from('public_data.stades').insert({ name, description, image_url: imageUrl, order });
        if (error) showMessage('Erreur ajout: ' + error.message, 'error');
        else {
            showMessage('Stade ajouté', 'success');
            document.getElementById('addStadeForm').reset();
            loadStades();
        }
    });

    window.editStade = async (id) => {
        const { data } = await supabase.from('public_data.stades').select('*').eq('id', id).single();
        if (!data) return;
        const newName = prompt('Nouveau nom', data.name);
        if (newName === null) return;
        const newDesc = prompt('Nouvelle description', data.description);
        const newOrder = prompt('Ordre', data.order);
        let newImageUrl = data.image_url;
        const changeImage = confirm('Changer l\'image ?');
        if (changeImage) {
            const fileInput = document.createElement('input');
            fileInput.type = 'file';
            fileInput.accept = 'image/*';
            fileInput.onchange = async (e) => {
                const file = e.target.files[0];
                if (file) {
                    try {
                        newImageUrl = await uploadStadeImage(file);
                    } catch (err) {
                        showMessage('Erreur upload', 'error');
                        return;
                    }
                }
                await updateStade();
            };
            fileInput.click();
            return;
        }
        async function updateStade() {
            const { error } = await supabase.from('public_data.stades').update({
                name: newName,
                description: newDesc,
                image_url: newImageUrl,
                order: parseInt(newOrder) || 0
            }).eq('id', id);
            if (error) showMessage('Erreur modification', 'error');
            else {
                showMessage('Modifié', 'success');
                loadStades();
            }
        }
        if (!changeImage) await updateStade();
    };

    window.deleteStade = async (id) => {
        if (!confirm('Supprimer définitivement ?')) return;
        const { error } = await supabase.from('public_data.stades').delete().eq('id', id);
        if (error) showMessage('Erreur suppression', 'error');
        else {
            showMessage('Supprimé', 'success');
            loadStades();
        }
    };

    // Déconnexion
    document.getElementById('logoutBtn').addEventListener('click', async () => {
        await supabase.auth.signOut();
        window.location.href = '../administration.html';
    });

    // Initialisation
    (async () => {
        const auth = await checkAuth();
        if (!auth) return;
        loadEngagements();
        loadRoles();
        loadStades();
    })();
</script>
</body>
</html>
