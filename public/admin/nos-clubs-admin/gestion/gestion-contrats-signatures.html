<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Signatures des contrats | HubISoccer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="gestion-contrats-signatures.css">
</head>
<body>
    <!-- ========== DÉBUT : LOADER GLOBAL ========== -->
    <div id="globalLoader" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 9999; justify-content: center; align-items: center; color: white; font-size: 1.2rem;">
        <div class="spinner"></div> Chargement...
    </div>
    <!-- ========== FIN : LOADER GLOBAL ========== -->

    <!-- ========== DÉBUT : NAVIGATION ========== -->
    <nav>
        <a href="../../../index.html" class="logo-link">
            <img src="../../img/logo-navbar.png" alt="HubISoccer" class="logo-nav">
        </a>
        <div class="nav-right">
            <span class="admin-badge"><i class="fas fa-file-signature"></i> Administration Signatures</span>
            <button class="menu-toggle" id="menuToggle"><span></span><span></span><span></span></button>
            <div class="nav-links" id="navLinks">
                <a href="../administration.html"><i class="fas fa-th-large"></i> Portail</a>
                <a href="../acteurs-admin/acteurs-admin.html"><i class="fas fa-users"></i> Acteurs</a>
                <a href="../tournoi-admin/tournoi-admin.html"><i class="fas fa-trophy"></i> Tournois</a>
                <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Déconnexion</a>
            </div>
        </div>
    </nav>
    <!-- ========== FIN : NAVIGATION ========== -->

    <!-- ========== DÉBUT : CONTENU PRINCIPAL ========== -->
    <main class="admin-main">
        <div class="admin-container">
            <div class="page-header">
                <h1 class="page-title"><i class="fas fa-file-signature"></i> Signatures des contrats</h1>
                <p class="page-subtitle">Consultez les contrats signés et exportez-les en PDF.</p>
            </div>

            <!-- FILTRES -->
            <div class="filters-bar">
                <select id="typeFilter">
                    <option value="all">Tous les types</option>
                    <option value="talent">Talent</option>
                    <option value="coach">Coach</option>
                    <option value="parrain">Parrain</option>
                </select>
                <input type="date" id="dateFilter">
                <button id="refreshBtn" class="btn-refresh"><i class="fas fa-sync-alt"></i> Rafraîchir</button>
            </div>

            <!-- TABLEAU DES SIGNATURES -->
            <div class="table-container">
                <table id="signaturesTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Signataire</th>
                            <th>Type</th>
                            <th>Date</th>
                            <th>Adresse</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="signaturesBody">
                        <tr><td colspan="6" class="loading-placeholder">Chargement...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
    <!-- ========== FIN : CONTENU PRINCIPAL ========== -->

    <!-- ========== DÉBUT : MODALE DE VISUALISATION ========== -->
    <div id="viewModal" class="modal">
        <div class="modal-content large">
            <span class="close-modal">&times;</span>
            <h3><i class="fas fa-eye"></i> Contrat signé</h3>
            <div id="viewContent" style="max-height: 60vh; overflow-y: auto; background: #f8fafc; padding: 20px; border-radius: 16px; margin-bottom: 20px;"></div>
            <div id="viewSignature" style="text-align: center; margin-bottom: 20px;"></div>
            <button id="printContractBtn" class="btn-submit"><i class="fas fa-print"></i> Imprimer / Exporter en PDF</button>
        </div>
    </div>
    <!-- ========== FIN : MODALE DE VISUALISATION ========== -->

    <div id="toastContainer" class="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="gestion-contrats-signatures.js"></script>
</body>
</html>
