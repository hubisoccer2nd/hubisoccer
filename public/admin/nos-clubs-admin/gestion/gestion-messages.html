<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Gestion des messages | HubISoccer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="gestion-messages.css">
</head>
<body>
    <!-- ========== DÉBUT : LOADER GLOBAL ========== -->
    <div id="globalLoader" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 9999; justify-content: center; align-items: center; color: white; font-size: 1.2rem;">
        <div class="spinner"></div> Chargement...
    </div>
    <!-- ========== FIN : LOADER GLOBAL ========== -->

    <!-- ========== DÉBUT : NAVIGATION ========== -->
    <nav>
        <a href="../../../index.html" class="logo-link">
            <img src="../../img/logo-navbar.png" alt="HubISoccer" class="logo-nav">
        </a>
        <div class="nav-right">
            <span class="admin-badge"><i class="fas fa-envelope"></i> Administration Messages</span>
            <button class="menu-toggle" id="menuToggle"><span></span><span></span><span></span></button>
            <div class="nav-links" id="navLinks">
                <a href="../administration.html"><i class="fas fa-th-large"></i> Portail</a>
                <a href="../acteurs-admin/acteurs-admin.html"><i class="fas fa-users"></i> Acteurs</a>
                <a href="../tournoi-admin/tournoi-admin.html"><i class="fas fa-trophy"></i> Tournois</a>
                <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Déconnexion</a>
            </div>
        </div>
    </nav>
    <!-- ========== FIN : NAVIGATION ========== -->

    <!-- ========== DÉBUT : CONTENU PRINCIPAL ========== -->
    <main class="admin-main">
        <div class="admin-container">
            <div class="page-header">
                <h1 class="page-title"><i class="fas fa-envelope"></i> Gestion des messages – Nos Clubs</h1>
                <p class="page-subtitle">Consultez et modérez les messages échangés dans tous les clubs.</p>
            </div>

            <!-- ========== FILTRES ========== -->
            <div class="filters-bar">
                <input type="text" id="searchInput" placeholder="Rechercher dans les messages...">
                <select id="clubFilter">
                    <option value="all">Tous les clubs</option>
                </select>
                <select id="senderFilter">
                    <option value="all">Tous les expéditeurs</option>
                    <option value="admin">Administration</option>
                    <option value="coach">Coach</option>
                    <option value="parrain">Parrain</option>
                    <option value="talent">Talent</option>
                </select>
            </div>
            <!-- ========== FIN : FILTRES ========== -->

            <!-- ========== TABLEAU DES MESSAGES ========== -->
            <div class="table-container">
                <table id="messagesTable">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Club</th>
                            <th>Expéditeur</th>
                            <th>Message</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="messagesBody">
                        <tr><td colspan="5" class="loading-placeholder">Chargement...</td></tr>
                    </tbody>
                </table>
            </div>
            <!-- ========== FIN : TABLEAU ========== -->
        </div>
    </main>
    <!-- ========== FIN : CONTENU PRINCIPAL ========== -->

    <!-- ========== DÉBUT : FOOTER ========== -->
    <footer>
        <div class="legal">
            <p>© 2026 HubISoccer - Tous droits réservés.</p>
        </div>
    </footer>
    <!-- ========== FIN : FOOTER ========== -->

    <div id="toastContainer" class="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="gestion-messages.js"></script>
</body>
</html>
