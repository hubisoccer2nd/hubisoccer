<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Consultation des présences | HubISoccer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="gestion-presences.css">
</head>
<body>
    <!-- ========== DÉBUT : LOADER GLOBAL ========== -->
    <div id="globalLoader" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 9999; justify-content: center; align-items: center; color: white; font-size: 1.2rem;">
        <div class="spinner"></div> Chargement...
    </div>
    <!-- ========== FIN : LOADER GLOBAL ========== -->

    <!-- ========== DÉBUT : NAVIGATION ========== -->
    <nav>
        <a href="../../../index.html" class="logo-link">
            <img src="../../img/logo-navbar.png" alt="HubISoccer" class="logo-nav">
        </a>
        <div class="nav-right">
            <span class="admin-badge"><i class="fas fa-clipboard-check"></i> Administration Présences</span>
            <button class="menu-toggle" id="menuToggle"><span></span><span></span><span></span></button>
            <div class="nav-links" id="navLinks">
                <a href="../administration.html"><i class="fas fa-th-large"></i> Portail</a>
                <a href="../acteurs-admin/acteurs-admin.html"><i class="fas fa-users"></i> Acteurs</a>
                <a href="../tournoi-admin/tournoi-admin.html"><i class="fas fa-trophy"></i> Tournois</a>
                <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Déconnexion</a>
            </div>
        </div>
    </nav>
    <!-- ========== FIN : NAVIGATION ========== -->

    <!-- ========== DÉBUT : CONTENU PRINCIPAL ========== -->
    <main class="admin-main">
        <div class="admin-container">
            <div class="page-header">
                <h1 class="page-title"><i class="fas fa-clipboard-check"></i> Consultation des présences – Nos Clubs</h1>
                <p class="page-subtitle">Visualisez les feuilles de présence remplies par les coaches.</p>
            </div>

            <!-- ========== FILTRES ========== -->
            <div class="filters-bar">
                <select id="clubFilter">
                    <option value="all">Tous les clubs</option>
                </select>
                <input type="date" id="dateFilter">
            </div>
            <!-- ========== FIN : FILTRES ========== -->

            <!-- ========== TABLEAU DES PRÉSENCES ========== -->
            <div class="table-container">
                <table id="presencesTable">
                    <thead>
                        <tr>
                            <th>Talent</th>
                            <th>Club</th>
                            <th>Date</th>
                            <th>Présent</th>
                            <th>Commentaire</th>
                        </tr>
                    </thead>
                    <tbody id="presencesBody">
                        <tr><td colspan="5" class="loading-placeholder">Chargement...</td></tr>
                    </tbody>
                </table>
            </div>
            <!-- ========== FIN : TABLEAU ========== -->
        </div>
    </main>
    <!-- ========== FIN : CONTENU PRINCIPAL ========== -->

    <!-- ========== DÉBUT : FOOTER ========== -->
    <footer>
        <div class="legal">
            <p>© 2026 HubISoccer - Tous droits réservés.</p>
        </div>
    </footer>
    <!-- ========== FIN : FOOTER ========== -->

    <div id="toastContainer" class="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="gestion-presences.js"></script>
</body>
</html>
