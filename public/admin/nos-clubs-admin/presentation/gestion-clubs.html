<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Gestion des clubs | HubISoccer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="gestion-clubs.css">
</head>
<body>
    <!-- ========== DÉBUT : LOADER GLOBAL ========== -->
    <div id="globalLoader" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 9999; justify-content: center; align-items: center; color: white; font-size: 1.2rem;">
        <div class="spinner"></div> Chargement...
    </div>
    <!-- ========== FIN : LOADER GLOBAL ========== -->

    <!-- ========== DÉBUT : NAVIGATION ADMIN ========== -->
    <nav>
        <a href="../../../index.html" class="logo-link">
            <img src="../../../public/img/logo-navbar.png" alt="HubISoccer" class="logo-nav">
        </a>
        <div class="nav-right">
            <span class="admin-badge"><i class="fas fa-users"></i> Administration Clubs</span>
            <button class="menu-toggle" id="menuToggle"><span></span><span></span><span></span></button>
            <div class="nav-links" id="navLinks">
                <a href="../../index-admin/"><i class="fas fa-th-large"></i> Portail</a>
                <a href="../../acteurs-admin/acteurs-admin.html"><i class="fas fa-users"></i> Acteurs</a>
                <a href="../../premierpas-admin/premier-pas-admin.html"><i class="fas fa-running"></i> Premier Pas</a>
                <a href="../../artistes-admin/artistes-admin.html"><i class="fas fa-paint-brush"></i> Artistes</a>
                <a href="../../tournoi-admin/tournoi-admin.html"><i class="fas fa-trophy"></i> Tournois</a>
                <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Déconnexion</a>
            </div>
        </div>
    </nav>
    <!-- ========== FIN : NAVIGATION ========== -->

    <main class="admin-main">
        <div class="admin-container">
            <div class="page-header">
                <h1 class="page-title"><i class="fas fa-users"></i> Gestion des clubs</h1>
                <p class="page-subtitle">Créez, modifiez, archivez ou supprimez les clubs visibles sur la page publique.</p>
            </div>

            <div class="filters-bar">
                <input type="text" id="searchInput" placeholder="Rechercher par nom ou ville...">
                <select id="statutFilter">
                    <option value="all">Tous les statuts</option>
                    <option value="actif">Actifs</option>
                    <option value="archive">Archivés</option>
                </select>
                <button id="newClubBtn" class="btn-primary"><i class="fas fa-plus-circle"></i> Créer un club</button>
                <button id="refreshClubsBtn" class="btn-refresh"><i class="fas fa-sync-alt"></i> Rafraîchir</button>
            </div>

            <div class="table-container">
                <table id="clubsTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nom</th>
                            <th>Discipline</th>
                            <th>Ville</th>
                            <th>Quota</th>
                            <th>Statut</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="7" class="loading-placeholder">Chargement...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- ========== MODALES (restent identiques) ========== -->
    <div id="clubModal" class="modal">
        <!-- contenu du formulaire identique à votre version, non reproduit ici pour ne pas tronquer -->
    </div>
    <div id="viewModal" class="modal">...</div>
    <div id="deleteModal" class="modal">...</div>

    <div id="toastContainer" class="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="gestion-clubs.js"></script>
</body>
</html>
<!-- FIN : public/admin/nos-clubs-admin/gestion/gestion-clubs.html -->
