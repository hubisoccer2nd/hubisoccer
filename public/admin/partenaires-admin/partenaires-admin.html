<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Gestion des partenaires | HubISoccer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="partenaires-admin.css">
</head>
<body>
    <!-- ========== DÉBUT : LOADER ========== -->
    <div id="globalLoader" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 9999; justify-content: center; align-items: center; color: white; font-size: 1.2rem;">
        <div class="spinner"></div> Chargement...
    </div>
    <!-- ========== FIN : LOADER ========== -->

    <!-- ========== DÉBUT : NAVIGATION ========== -->
    <nav>
        <a href="../../../index.html" class="logo-link">
            <img src="../img/logo-navbar.png" alt="HubISoccer" class="logo-nav">
        </a>
        <div class="nav-right">
            <span class="admin-badge"><i class="fas fa-handshake"></i> Administration Partenaires</span>
            <button class="menu-toggle" id="menuToggle"><span></span><span></span><span></span></button>
            <div class="nav-links" id="navLinks">
                <a href="../administration/"><i class="fas fa-th-large"></i> Portail</a>
                <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Déconnexion</a>
            </div>
        </div>
    </nav>
    <!-- ========== FIN : NAVIGATION ========== -->

    <!-- ========== DÉBUT : CONTENU PRINCIPAL ========== -->
    <main class="admin-main">
        <div class="admin-container">
            <div class="page-header">
                <h1><i class="fas fa-handshake"></i> Gestion des partenaires</h1>
                <p>Ajoutez, modifiez ou supprimez les logos et descriptions de vos partenaires.</p>
            </div>

            <div class="form-card">
                <h2 id="formTitle"><i class="fas fa-plus-circle"></i> Ajouter un partenaire</h2>
                <form id="partenaireForm">
                    <input type="hidden" id="partenaireId">
                    <div class="form-group">
                        <label>Nom</label>
                        <input type="text" id="nom" required>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="description" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Site web</label>
                        <input type="url" id="site_web">
                    </div>
                    <div class="form-group">
                        <label>Logo</label>
                        <input type="file" id="logoFile" accept="image/*">
                    </div>
                    <div class="form-group">
                        <label>Ordre</label>
                        <input type="number" id="ordre" value="0" min="0">
                    </div>
                    <button type="submit" class="btn-submit"><i class="fas fa-save"></i> Enregistrer</button>
                    <button type="button" class="btn-cancel" id="cancelBtn" style="display:none;"><i class="fas fa-times"></i> Annuler</button>
                </form>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Logo</th>
                            <th>Nom</th>
                            <th>Description</th>
                            <th>Ordre</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="partenairesBody">
                        <tr><td colspan="5" class="loading-placeholder">Chargement...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
    <!-- ========== FIN : CONTENU PRINCIPAL ========== -->

    <div id="toastContainer" class="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="partenaires-admin.js"></script>
</body>
</html>
<!-- FIN : public/admin/partenaires-admin/partenaires-admin.html -->
