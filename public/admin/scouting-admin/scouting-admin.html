<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Scouting | HubISoccer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="scouting-admin.css">
</head>
<body>
    <!-- ========== DÉBUT : LOADER GLOBAL ========== -->
    <div id="globalLoader" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 9999; justify-content: center; align-items: center; color: white; font-size: 1.2rem;">
        <div class="spinner"></div> Chargement...
    </div>
    <!-- ========== FIN : LOADER GLOBAL ========== -->

    <!-- ========== DÉBUT : NAVIGATION ========== -->
    <nav>
        <a href="../../../index.html" class="logo-link">
            <img src="../img/logo-navbar.png" alt="HubISoccer" class="logo-nav">
        </a>
        <div class="nav-right">
            <span class="admin-badge"><i class="fas fa-search"></i> Administration Scouting</span>
            <button class="menu-toggle" id="menuToggle"><span></span><span></span><span></span></button>
            <div class="nav-links" id="navLinks">
                <a href="../administration/"><i class="fas fa-th-large"></i> Portail</a>
                <a href="../acteurs-admin/"><i class="fas fa-users"></i> Acteurs</a>
                <a href="../tournoi-admin/"><i class="fas fa-trophy"></i> Tournois</a>
                <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Déconnexion</a>
            </div>
        </div>
    </nav>
    <!-- ========== FIN : NAVIGATION ========== -->

    <!-- ========== DÉBUT : CONTENU PRINCIPAL ========== -->
    <main class="admin-main">
        <div class="admin-container">
            <div class="page-header">
                <h1><i class="fas fa-search"></i> Gestion du Scouting</h1>
                <p>Ajoutez, modifiez ou supprimez les talents mis en avant sur la page Scouting publique.</p>
            </div>

            <!-- Formulaire d'ajout / modification -->
            <div class="form-card">
                <h2 id="formTitle"><i class="fas fa-plus-circle"></i> Ajouter un talent</h2>
                <form id="talentForm">
                    <input type="hidden" id="talentId">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Nom complet *</label>
                            <input type="text" id="nom" required>
                        </div>
                        <div class="form-group">
                            <label>Poste *</label>
                            <input type="text" id="poste" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Âge</label>
                            <input type="number" id="age" min="10" max="60">
                        </div>
                        <div class="form-group">
                            <label>Pays *</label>
                            <input type="text" id="pays" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Continent</label>
                            <select id="continent">
                                <option value="Afrique">Afrique</option>
                                <option value="Europe">Europe</option>
                                <option value="Asie">Asie</option>
                                <option value="Amérique">Amérique</option>
                                <option value="Océanie">Océanie</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Catégorie</label>
                            <select id="cat">
                                <option value="U13">U13</option>
                                <option value="U15">U15</option>
                                <option value="U17">U17</option>
                                <option value="U20">U20</option>
                                <option value="Senior">Senior</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Club</label>
                            <input type="text" id="club">
                        </div>
                        <div class="form-group">
                            <label>Certification</label>
                            <input type="text" id="cert">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Photo du talent</label>
                        <input type="file" id="imageFile" accept="image/*">
                    </div>
                    <div class="form-group">
                        <label>Vidéo de présentation</label>
                        <input type="file" id="videoFile" accept="video/*">
                    </div>
                    <button type="submit" class="btn-submit" id="submitBtn"><i class="fas fa-save"></i> Enregistrer</button>
                    <button type="button" class="btn-cancel" id="cancelBtn" style="display:none;"><i class="fas fa-times"></i> Annuler</button>
                </form>
            </div>

            <!-- Liste des talents -->
            <div class="table-container">
                <table id="talentsTable">
                    <thead>
                        <tr>
                            <th>Photo</th>
                            <th>Nom</th>
                            <th>Poste</th>
                            <th>Âge</th>
                            <th>Pays</th>
                            <th>Catégorie</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="talentsBody">
                        <tr><td colspan="7" class="loading-placeholder">Chargement...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
    <!-- ========== FIN : CONTENU PRINCIPAL ========== -->

    <div id="toastContainer" class="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="scouting-admin.js"></script>
</body>
</html>
<!-- FIN : public/admin/scouting-admin/scouting-admin.html -->
