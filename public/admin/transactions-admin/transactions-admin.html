<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Gestion des transactions | HubISoccer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="transactions-admin.css">
</head>
<body>
    <div id="globalLoader" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 9999; justify-content: center; align-items: center; color: white; font-size: 1.2rem;">
        <div class="spinner"></div> Chargement...
    </div>

    <nav>
        <a href="../../../index.html" class="logo-link">
            <img src="../../img/logo-navbar.png" alt="HubISoccer" class="logo-nav">
        </a>
        <div class="nav-right">
            <span class="admin-badge">Espace Administration - Transactions</span>
            <button class="menu-toggle" id="menuToggle"><span></span><span></span><span></span></button>
            <div class="nav-links" id="navLinks">
                <a href="../administration.html">Accueil site</a>
                <a href="#" id="logoutBtn">Déconnexion</a>
            </div>
        </div>
    </nav>

    <main class="admin-main">
        <div class="admin-container">
            <h1 class="page-title"><i class="fas fa-exchange-alt"></i> Gestion des transactions</h1>
            <p class="page-subtitle">Validez ou rejetez les demandes de dépôt et de retrait des sportifs.</p>

            <div class="filters">
                <select id="typeFilter">
                    <option value="all">Tous les types</option>
                    <option value="depot">Dépôts</option>
                    <option value="retrait">Retraits</option>
                </select>
                <select id="statutFilter">
                    <option value="all">Tous les statuts</option>
                    <option value="en_attente">En attente</option>
                    <option value="valide">Validé</option>
                    <option value="rejete">Rejeté</option>
                </select>
                <button id="refreshBtn" class="btn-refresh"><i class="fas fa-sync-alt"></i> Rafraîchir</button>
            </div>

            <div id="transactionsList" class="transactions-list"></div>
        </div>
    </main>

    <footer>
        <div class="legal">
            <p>© 2026 HubISoccer - Administration Transactions. Tous droits réservés.</p>
        </div>
    </footer>

    <div id="toastContainer" class="toast-container"></div>

    <!-- Modale de traitement -->
    <div id="traitementModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h3>Traiter la transaction</h3>
            <div id="transactionInfo" class="info-box"></div>
            <div class="form-group">
                <label>Action</label>
                <select id="actionSelect">
                    <option value="valide">Valider</option>
                    <option value="rejete">Rejeter</option>
                </select>
            </div>
            <div class="form-group">
                <label>Commentaire (optionnel)</label>
                <textarea id="commentaire" rows="3"></textarea>
            </div>
            <button id="saveTraitementBtn" class="btn-submit">Enregistrer</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="transactions-admin.js"></script>
</body>
</html>
