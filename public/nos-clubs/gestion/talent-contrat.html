<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau de bord Talent | HubISoccer</title>
    <meta name="description" content="Espace personnel du talent – suivez votre club, votre progression et vos messages.">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="talent-dash.css">
</head>
<body>
    <!-- ========== DÉBUT : NAVBAR MEMBRE ========== -->
    <nav class="member-nav">
        <div class="nav-brand">
            <img src="../../img/logo-navbar.png" alt="HubISoccer" class="logo-nav">
            <span class="nav-title">Espace Talent</span>
        </div>
        <button class="menu-toggle" id="menuToggle"><span></span><span></span><span></span></button>
        <div class="nav-links" id="navLinks">
            <a href="talent-dash.html" class="active" data-nav-link="talent-dash.html"><i class="fas fa-tachometer-alt"></i> Tableau de bord</a>
            <a href="talent-messages.html" data-nav-link="talent-messages.html"><i class="fas fa-envelope"></i> Messages</a>
            <a href="talent-contrat.html" data-nav-link="talent-contrat.html"><i class="fas fa-file-signature"></i> Contrat</a>
            <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Déconnexion</a>
        </div>
    </nav>
    <!-- ========== FIN : NAVBAR MEMBRE ========== -->

    <main class="dashboard-main">
        <div class="dashboard-container">
            <section class="club-header" id="clubHeader">
                <div class="club-logo-container" id="clubLogoContainer"></div>
                <div class="club-info">
                    <h1 id="clubNom"></h1>
                    <p id="clubDiscipline"></p>
                </div>
                <div class="club-encadrement">
                    <p id="clubCoach"></p>
                    <p id="clubParrain"></p>
                </div>
            </section>
            <div class="dashboard-grid">
                <section class="card"><h2><i class="fas fa-calendar-alt"></i> Calendrier</h2><div id="calendrierContent"><p>Chargement...</p></div></section>
                <section class="card"><h2><i class="fas fa-graduation-cap"></i> Suivi Trinité</h2><div id="triniteContent"><p>Chargement...</p></div></section>
                <section class="card"><h2><i class="fas fa-bullhorn"></i> Mur du club</h2><div id="murContent"><p>Chargement...</p></div></section>
            </div>
        </div>
    </main>

    <footer>
        <div class="legal">
            <p><strong>HubISoccer - The Hub of Inspiration of Soccer</strong></p>
            <p>RCCM : RB/ABC/24 A 111814 | IFU : 0201910800236</p>
            <p>© 2026 HubISoccer - Ozawa. Tous droits réservés.</p>
        </div>
    </footer>

    <div id="toastContainer" class="toast-container"></div>

    <!-- Maintien de l'ID dans les liens -->
    <script>
        (function() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if (!id) return;
            document.querySelectorAll('a[data-nav-link]').forEach(link => {
                const basePage = link.getAttribute('data-nav-link');
                if (basePage) link.href = basePage + '?id=' + id;
            });
        })();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../nos-clubs-i18n.js"></script>
    <script src="talent-dash.js"></script>
</body>
</html>
