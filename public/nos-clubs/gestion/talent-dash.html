<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau de bord Talent | HubISoccer</title>
    <meta name="description" content="Espace personnel du talent – suivez votre club, votre progression et vos messages.">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="talent-dash.css">
</head>
<body>
    <!-- ========== DÉBUT : NAVBAR MEMBRE ========== -->
    <nav class="member-nav">
        <div class="nav-brand">
            <img src="../../img/logo-navbar.png" alt="HubISoccer" class="logo-nav">
            <span class="nav-title">Espace Talent</span>
        </div>
        <button class="menu-toggle" id="menuToggle"><span></span><span></span><span></span></button>
        <div class="nav-links" id="navLinks">
            <a href="talent-dash.html" class="active"><i class="fas fa-tachometer-alt"></i> Tableau de bord</a>
            <a href="talent-messages.html"><i class="fas fa-envelope"></i> Messages</a>
            <a href="talent-contrat.html"><i class="fas fa-file-signature"></i> Contrat</a>
            <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Déconnexion</a>
        </div>
    </nav>
    <!-- ========== FIN : NAVBAR MEMBRE ========== -->

    <!-- ========== DÉBUT : CONTENU PRINCIPAL ========== -->
    <main class="dashboard-main">
        <div class="dashboard-container">
            <!-- En-tête du club -->
            <section class="club-header" id="clubHeader">
                <div class="club-logo-container" id="clubLogoContainer">
                    <!-- Injecté par JS : logo ou initiales -->
                </div>
                <div class="club-info">
                    <h1 id="clubNom"></h1>
                    <p id="clubDiscipline"></p>
                </div>
                <div class="club-encadrement">
                    <p id="clubCoach"></p>
                    <p id="clubParrain"></p>
                </div>
            </section>

            <!-- Grille principale -->
            <div class="dashboard-grid">
                <!-- Calendrier -->
                <section class="card">
                    <h2><i class="fas fa-calendar-alt"></i> Calendrier</h2>
                    <div id="calendrierContent">
                        <p>Chargement...</p>
                    </div>
                </section>

                <!-- Suivi Trinité -->
                <section class="card">
                    <h2><i class="fas fa-graduation-cap"></i> Suivi Trinité</h2>
                    <div id="triniteContent">
                        <p>Chargement...</p>
                    </div>
                </section>

                <!-- Mur du club -->
                <section class="card">
                    <h2><i class="fas fa-bullhorn"></i> Mur du club</h2>
                    <div id="murContent">
                        <p>Chargement...</p>
                    </div>
                </section>
            </div>
        </div>
    </main>
    <!-- ========== FIN : CONTENU PRINCIPAL ========== -->

    <!-- ========== DÉBUT : FOOTER ========== -->
    <footer>
        <div class="legal">
            <p><strong>HubISoccer - The Hub of Inspiration of Soccer</strong></p>
            <p>RCCM : RB/ABC/24 A 111814 | IFU : 0201910800236</p>
            <p>© 2026 HubISoccer - Ozawa. Tous droits réservés.</p>
        </div>
    </footer>
    <!-- ========== FIN : FOOTER ========== -->

    <div id="toastContainer" class="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../nos-clubs-i18n.js"></script>
    <script src="talent-dash.js"></script>
</body>
</html>
